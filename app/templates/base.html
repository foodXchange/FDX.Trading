<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title | default('Food Xchange') }}{% endblock %} - Food Xchange</title>
    
    <!-- Food Xchange Custom Fonts -->
    <link rel="stylesheet" href="/static/brand/fx-fonts.css">
    
    <!-- Complete Brand System -->
    <link rel="stylesheet" href="/static/brand/fx-complete.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configure Tailwind with Food Xchange colors and fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fx-primary': '#4A90E2',
                        'fx-secondary': '#F97316',
                        'fx-accent': '#10B981',
                    },
                    fontFamily: {
                        'causten': ['Causten', 'sans-serif'],
                        'david-libre': ['David Libre', 'serif'],
                        'roboto-serif': ['Roboto Serif', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- v0 Generated Styles -->
    {% block extra_css %}{% endblock %}

    <!-- Custom styles -->
    <style>
        body {
            font-family: 'Roboto Serif', serif;
            background-color: var(--fx-background);
            color: var(--fx-text);
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'David Libre', serif;
            font-weight: 600;
        }
        
        .fx-btn-primary {
            background: linear-gradient(135deg, var(--fx-primary) 0%, var(--fx-primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--fx-radius-md);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .fx-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--fx-shadow-lg);
        }
        
        .fx-btn-secondary {
            background: linear-gradient(135deg, var(--fx-secondary) 0%, var(--fx-secondary-dark) 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--fx-radius-md);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .fx-btn-secondary:hover {
            transform: translateY(-1px);
            box-shadow: var(--fx-shadow-lg);
        }
    </style>
</head>
<body class="font-roboto-serif bg-white text-gray-800">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <img src="/static/brand/logos/Favicon.png" alt="Food Xchange" class="h-8 w-auto">
                        <h1 class="text-xl font-david-libre font-semibold text-fx-primary ml-2">Food Xchange</h1>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-600 hover:text-fx-primary px-3 py-2 rounded-md text-sm font-medium">Home</a>
                    <a href="/rfq-form" class="text-gray-600 hover:text-fx-primary px-3 py-2 rounded-md text-sm font-medium">RFQ</a>
                    <a href="/suppliers" class="text-gray-600 hover:text-fx-primary px-3 py-2 rounded-md text-sm font-medium">Suppliers</a>
                </div>
            </div>
        </div>
        </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-50 border-t border-gray-200 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center text-gray-600">
                <p>&copy; 2025 Food Xchange. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- FDX Trading FullStory User Identification -->
    <script>
        // Advanced user identification for FDX Trading
        function identifyFDXUser(userData) {
            if (window.FS && userData) {
                FS('setIdentity', {
                    uid: userData.id || userData.user_id || 'anonymous_' + Date.now(),
                    properties: {
                        displayName: userData.name || userData.display_name || 'Anonymous User',
                        email: userData.email || '',
                        userType: userData.user_type || userData.role || 'visitor',
                        company: userData.company || userData.organization || '',
                        department: userData.department || '',
                        location: userData.location || userData.country || '',
                        registrationDate: userData.created_at || userData.registration_date || '',
                        lastLogin: userData.last_login || new Date().toISOString(),
                        subscriptionTier: userData.subscription_tier || userData.plan || 'free',
                        totalOrders: userData.total_orders || 0,
                        totalSpent: userData.total_spent || 0,
                        preferredCategories: userData.preferred_categories || [],
                        accountStatus: userData.status || 'active',
                        source: 'fdx_trading_web'
                    }
                });
                console.log('FDX User identified:', userData);
            }
        }

        // Specific user type identification
        function identifyBuyer(buyerData) {
            if (window.FS && buyerData) {
                FS('setIdentity', {
                    uid: buyerData.id || 'buyer_' + Date.now(),
                    properties: {
                        displayName: buyerData.name || 'Buyer',
                        email: buyerData.email || '',
                        userType: 'buyer',
                        company: buyerData.company || '',
                        industry: buyerData.industry || '',
                        purchaseVolume: buyerData.purchase_volume || 'medium',
                        preferredSuppliers: buyerData.preferred_suppliers || [],
                        totalRFQs: buyerData.total_rfqs || 0,
                        totalOrders: buyerData.total_orders || 0,
                        averageOrderValue: buyerData.avg_order_value || 0,
                        lastPurchaseDate: buyerData.last_purchase_date || '',
                        creditLimit: buyerData.credit_limit || 0,
                        paymentTerms: buyerData.payment_terms || 'net30'
                    }
                });
            }
        }

        function identifySupplier(supplierData) {
            if (window.FS && supplierData) {
                FS('setIdentity', {
                    uid: supplierData.id || 'supplier_' + Date.now(),
                    properties: {
                        displayName: supplierData.name || 'Supplier',
                        email: supplierData.email || '',
                        userType: 'supplier',
                        company: supplierData.company || '',
                        industry: supplierData.industry || '',
                        productCategories: supplierData.product_categories || [],
                        certifications: supplierData.certifications || [],
                        totalQuotes: supplierData.total_quotes || 0,
                        totalOrders: supplierData.total_orders || 0,
                        averageQuoteValue: supplierData.avg_quote_value || 0,
                        responseTime: supplierData.avg_response_time || 0,
                        rating: supplierData.rating || 0,
                        location: supplierData.location || '',
                        shippingCapabilities: supplierData.shipping_capabilities || []
                    }
                });
            }
        }

        function identifyAgent(agentData) {
            if (window.FS && agentData) {
                FS('setIdentity', {
                    uid: agentData.id || 'agent_' + Date.now(),
                    properties: {
                        displayName: agentData.name || 'Agent',
                        email: agentData.email || '',
                        userType: 'agent',
                        company: agentData.company || '',
                        specialization: agentData.specialization || '',
                        totalDeals: agentData.total_deals || 0,
                        commissionRate: agentData.commission_rate || 0,
                        activeClients: agentData.active_clients || 0,
                        performanceRating: agentData.performance_rating || 0,
                        territories: agentData.territories || [],
                        experience: agentData.experience_years || 0
                    }
                });
            }
        }

        // Event tracking functions
        function trackRFQCreated(rfqData) {
            if (window.FS && rfqData) {
                FS('event', 'RFQ Created', {
                    rfqId: rfqData.id,
                    category: rfqData.category,
                    quantity: rfqData.quantity,
                    unit: rfqData.unit,
                    deliveryDate: rfqData.delivery_date,
                    budget: rfqData.budget,
                    userType: '{{ user.user_type if user else "anonymous" }}',
                    timestamp: new Date().toISOString()
                });
            }
        }

        function trackQuoteSubmitted(quoteData) {
            if (window.FS && quoteData) {
                FS('event', 'Quote Submitted', {
                    quoteId: quoteData.id,
                    rfqId: quoteData.rfq_id,
                    price: quoteData.price,
                    currency: quoteData.currency,
                    deliveryTime: quoteData.delivery_time,
                    supplier: quoteData.supplier_name,
                    userType: '{{ user.user_type if user else "anonymous" }}',
                    timestamp: new Date().toISOString()
                });
            }
        }

        function trackOrderPlaced(orderData) {
            if (window.FS && orderData) {
                FS('event', 'Order Placed', {
                    orderId: orderData.id,
                    totalValue: orderData.total_value,
                    currency: orderData.currency,
                    items: orderData.items_count,
                    supplier: orderData.supplier_name,
                    buyer: orderData.buyer_name,
                    userType: '{{ user.user_type if user else "anonymous" }}',
                    timestamp: new Date().toISOString()
                });
            }
        }

        function trackUserRegistered(userData) {
            if (window.FS && userData) {
                FS('event', 'User Registered', {
                    userId: userData.id,
                    userType: userData.user_type,
                    source: userData.registration_source || 'web',
                    timestamp: new Date().toISOString()
                });
            }
        }

        function trackFormAbandonment(formData) {
            if (window.FS && formData) {
                FS('event', 'Form Abandoned', {
                    formType: formData.type,
                    step: formData.step,
                    fieldsCompleted: formData.fields_completed,
                    userType: '{{ user.user_type if user else "anonymous" }}',
                    timestamp: new Date().toISOString()
                });
            }
        }

        // Auto-identify user if data is available
        {% if user %}
            identifyFDXUser({
                id: '{{ user.id }}',
                name: '{{ user.name }}',
                email: '{{ user.email }}',
                user_type: '{{ user.user_type }}',
                company: '{{ user.company }}',
                created_at: '{{ user.created_at }}',
                last_login: '{{ user.last_login }}'
            });
        {% endif %}

        // Track page views
        FS('event', 'Page Viewed', {
            page: '{{ request.path }}',
            title: document.title,
            userType: '{{ user.user_type if user else "anonymous" }}',
            timestamp: new Date().toISOString()
        });
    </script>

    <!-- v0 Generated JavaScript -->
    {% block extra_js %}{% endblock %}
</body>
</html>
