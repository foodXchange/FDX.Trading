            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .status {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .test-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

            background: rgba(255,255,255,0.3);

<body>
    <div class="container">
        <h1>🚀 FDX Trading</h1>
        <h2>FullStory Integration Test</h2>
        
        <div class="status">
            <h3>✅ FullStory Snippet Installed</h3>
            <p>Org ID: o-23KNJV-na1</p>
            <p>Check your FullStory dashboard for sessions!</p>
        </div>
        
        <div class="test-buttons">
            <button onclick="testEvent()">Test Event</button>
            <button onclick="testUser()">Test User ID</button>
            <button onclick="testRFQ()">Test RFQ Event</button>
            <button onclick="testQuote()">Test Quote Event</button>
        </div>
        
        <div class="status">
            <p><strong>Instructions:</strong></p>
            <p>1. Click the test buttons above</p>
            <p>2. Check your FullStory dashboard</p>
            <p>3. Look for sessions and events</p>
        </div>
    </div>

    <script>
        // Test functions
        function testEvent() {
            if (window.FS) {
                FS('event', 'Test Button Clicked', {
                    button: 'test_event',
                    timestamp: new Date().toISOString()
                });
                alert('Event sent to FullStory!');
            } else {
                alert('FullStory not loaded yet');
            }
        }
        
        function testUser() {
            if (window.FS) {
                FS('setIdentity', {
                    uid: 'test_user_123',
                    properties: {
                        displayName: 'Test User',
                        email: 'test@fdx.trading',
                        userType: 'buyer',
                        company: 'Test Company'
                    }
                });
                alert('User identified in FullStory!');
            } else {
                alert('FullStory not loaded yet');
            }
        }
        
        function testRFQ() {
            if (window.FS) {
                FS('event', 'RFQ Created', {
                    rfqId: 'RFQ_001',
                    category: 'Grains',
                    quantity: '1000kg',
                    userType: 'buyer'
                });
                alert('RFQ event sent to FullStory!');
            } else {
                alert('FullStory not loaded yet');
            }
        }
        
        function testQuote() {
            if (window.FS) {
                FS('event', 'Quote Submitted', {
                    quoteId: 'QUOTE_001',
                    rfqId: 'RFQ_001',
                    price: '$5000',
                    supplier: 'Test Supplier'
                });
                alert('Quote event sent to FullStory!');
            } else {
                alert('FullStory not loaded yet');
            }
        }
        
        // Auto-identify as test user when page loads
        setTimeout(() => {
            if (window.FS) {
                FS('setIdentity', {
                    uid: 'test_visitor_' + Date.now(),
                    properties: {
                        displayName: 'Test Visitor',
                        userType: 'visitor',
                        source: 'test_page'
                    }
                });
                console.log('Test user auto-identified in FullStory');
            }
        }, 2000);
    </script>
