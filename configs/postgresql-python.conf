# PostgreSQL configuration optimized for Python/SQLAlchemy
# Tuned for FoodXchange application

# Connection settings optimized for Python connection pooling
max_connections = 100
superuser_reserved_connections = 3

# Memory settings (based on 512MB container limit)
shared_buffers = 128MB
effective_cache_size = 384MB
maintenance_work_mem = 64MB
work_mem = 4MB
wal_buffers = 16MB

# Checkpoint settings
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 1GB
min_wal_size = 80MB

# Python/SQLAlchemy query optimization
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0

# Logging for Python debugging
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB

# What to log
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000  # Log queries slower than 1 second

# Detailed logging for development
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_error_verbosity = default
log_hostname = off
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_statement = 'mod'  # Log DDL and data-modifying statements
log_temp_files = -1

# Performance monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_activity_query_size = 1024

# Statement timeout for Python apps (30 seconds)
statement_timeout = 30000

# Lock timeout (5 seconds)
lock_timeout = 5000

# Autovacuum tuning for Python apps
autovacuum = on
log_autovacuum_min_duration = -1
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1

# Python application settings
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# Extension settings
shared_preload_libraries = 'pg_stat_statements'

# Python SQLAlchemy compatibility
standard_conforming_strings = on
escape_string_warning = on