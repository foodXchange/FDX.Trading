# Redis configuration optimized for Python applications
# Designed for FoodXchange with Python/FastAPI/Flask

# Network settings
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory management optimized for Python caching
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence settings (balanced for cache + data)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF persistence for reliability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Python client optimizations
databases 16
always-show-logo no

# Performance tuning for Python apps
hz 10
dynamic-hz yes

# Slow log for debugging Python queries
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client handling
maxclients 10000

# Threading optimizations
io-threads 4
io-threads-do-reads yes

# Python-friendly eviction settings
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Latency monitoring
latency-monitor-threshold 100

# Active rehashing for better performance
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Enable keyspace notifications for Python apps
notify-keyspace-events "Ex"