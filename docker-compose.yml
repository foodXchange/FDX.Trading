version: '3.8'

services:
  # Main FoodXchange application
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ./foodxchange:/app  # Live code reloading
      - ./quick_health_check.py:/app/quick_health_check.py
      - ./validate_endpoints.py:/app/validate_endpoints.py
      - ./azure_connection_test.py:/app/azure_connection_test.py
      - /app/__pycache__  # Exclude Python cache
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/foodxchange
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - foodxchange-network

  # PostgreSQL database
  postgres:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: foodxchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - foodxchange-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - foodxchange-network

  # Azure health check service (runs periodic tests)
  azure-health:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./foodxchange:/app
      - ./quick_health_check.py:/app/quick_health_check.py
      - ./validate_endpoints.py:/app/validate_endpoints.py
      - ./azure_connection_test.py:/app/azure_connection_test.py
    env_file:
      - .env
    command: sh -c "while true; do echo '🔍 Running Azure health check...'; python quick_health_check.py; echo '💤 Sleeping for 10 minutes...'; sleep 600; done"
    depends_on:
      - web
    networks:
      - foodxchange-network

  # Database admin interface (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@foodxchange.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - foodxchange-network

  # Mailhog for email testing in development
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - foodxchange-network

  # Redis Commander for Redis monitoring
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - foodxchange-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  foodxchange-network:
    driver: bridge