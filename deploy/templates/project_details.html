<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - FoodXchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .supplier-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .supplier-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .score-badge {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        
        .country-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .project-header {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
<!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-globe"></i> FoodXchange
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/suppliers">
                        <i class="bi bi-robot"></i> AI Supplier Search
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/projects">
                        <i class="bi bi-folder2"></i> My Projects
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i> udi@fdx.trading
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Profile</a></li>
                        <li><a class="dropdown-item" href="/settings"><i class="bi bi-gear"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Back button -->
    <a href="/projects" class="btn btn-outline-secondary mb-3">
        <i class="bi bi-arrow-left"></i> Back to Projects
    </a>
    
    <!-- Project Header -->
    <div class="project-header" id="projectHeader">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    
    <!-- Filter Section -->
    <div class="filter-section">
        <h5 class="mb-3">Filter Suppliers</h5>
        <div class="row">
            <div class="col-md-6">
                <label class="form-label">Filter by Country</label>
                <div class="country-filter" id="countryFilters">
                    <!-- Will be populated dynamically -->
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Filter by Score</label>
                <div class="d-flex align-items-center gap-3">
                    <input type="range" class="form-range" id="scoreFilter" min="0" max="100" value="0">
                    <span id="scoreValue" class="badge bg-secondary">0+</span>
                </div>
                <small class="text-muted">Show suppliers with score above this value</small>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary btn-sm" onclick="applyFilters()">
                <i class="bi bi-funnel"></i> Apply Filters
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
                <i class="bi bi-x-circle"></i> Clear Filters
            </button>
        </div>
    </div>
    
    <!-- Suppliers List -->
    <div id="suppliersList">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let projectData = null;
let allSuppliers = [];
let filteredSuppliers = [];

// Get project ID from URL
const urlParams = new URLSearchParams(window.location.search);
const projectId = urlParams.get('id');

// Load project details when page loads
document.addEventListener('DOMContentLoaded', () => {
    if (projectId) {
        loadProjectDetails(projectId);
    } else {
        showError('No project ID provided');
    }
});

// Update score value display
document.getElementById('scoreFilter').addEventListener('input', (e) => {
    document.getElementById('scoreValue').textContent = e.target.value + '+';
});

async function loadProjectDetails(projectId) {
    try {
        const response = await fetch(`/api/projects/${projectId}`);
        const data = await response.json();
        
        if (data.error) {
            showError(data.error);
            return;
        }
        
        projectData = data.project;
        allSuppliers = data.suppliers || [];
        filteredSuppliers = [...allSuppliers];
        
        displayProjectHeader();
        setupCountryFilters();
        displaySuppliers();
        
    } catch (error) {
        showError('Failed to load project details');
    }
}

function displayProjectHeader() {
    const header = document.getElementById('projectHeader');
    const createdDate = new Date(projectData.created_at).toLocaleDateString();
    
    header.innerHTML = `
        <h2>${projectData.project_name}</h2>
        ${projectData.description ? `<p class="text-muted mb-3">${projectData.description}</p>` : ''}
        <div class="row text-center">
            <div class="col-md-4">
                <h5>${projectData.supplier_count}</h5>
                <small class="text-muted">Total Suppliers</small>
            </div>
            <div class="col-md-4">
                <h5>${getUniqueCountries().length}</h5>
                <small class="text-muted">Countries</small>
            </div>
            <div class="col-md-4">
                <h5>${createdDate}</h5>
                <small class="text-muted">Created Date</small>
            </div>
        </div>
    `;
}

function getUniqueCountries() {
    return [...new Set(allSuppliers.map(s => s.supplier_country))].filter(c => c);
}

function setupCountryFilters() {
    const countries = getUniqueCountries();
    const container = document.getElementById('countryFilters');
    
    let html = '<div class="form-check form-check-inline">';
    html += '<input class="form-check-input" type="checkbox" id="countryAll" value="all" checked>';
    html += '<label class="form-check-label" for="countryAll">All Countries</label>';
    html += '</div>';
    
    countries.forEach((country, index) => {
        html += `
            <div class="form-check form-check-inline">
                <input class="form-check-input country-checkbox" type="checkbox" 
                       id="country${index}" value="${country}" checked>
                <label class="form-check-label" for="country${index}">${country}</label>
            </div>
        `;
    });
    
    container.innerHTML = html;
    
    // Handle "All Countries" checkbox
    document.getElementById('countryAll').addEventListener('change', (e) => {
        document.querySelectorAll('.country-checkbox').forEach(cb => {
            cb.checked = e.target.checked;
        });
    });
}

function applyFilters() {
    const selectedCountries = Array.from(document.querySelectorAll('.country-checkbox:checked'))
        .map(cb => cb.value);
    const minScore = parseInt(document.getElementById('scoreFilter').value);
    
    filteredSuppliers = allSuppliers.filter(supplier => {
        const countryMatch = selectedCountries.includes(supplier.supplier_country);
        const scoreMatch = (supplier.score || 0) >= minScore;
        return countryMatch && scoreMatch;
    });
    
    displaySuppliers();
}

function clearFilters() {
    // Reset all checkboxes
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
    document.getElementById('scoreFilter').value = 0;
    document.getElementById('scoreValue').textContent = '0+';
    
    filteredSuppliers = [...allSuppliers];
    displaySuppliers();
}

function displaySuppliers() {
    const container = document.getElementById('suppliersList');
    
    if (filteredSuppliers.length === 0) {
        container.innerHTML = '<div class="alert alert-info">No suppliers match the selected filters</div>';
        return;
    }
    
    // Sort by score (highest first)
    filteredSuppliers.sort((a, b) => (b.score || 0) - (a.score || 0));
    
    let html = `<h4 class="mb-3">Suppliers (${filteredSuppliers.length})</h4>`;
    
    filteredSuppliers.forEach(supplier => {
        html += `
            <div class="supplier-card">
                <div class="row align-items-center">
                    <div class="col">
                        <h5 class="mb-1">${supplier.supplier_name}</h5>
                        <p class="mb-2">
                            <strong>Country:</strong> ${supplier.supplier_country || 'N/A'} | 
                            <strong>Email:</strong> ${supplier.supplier_email || 'No email'}
                        </p>
                        ${supplier.products ? 
                            `<p class="text-muted small mb-0">${supplier.products.substring(0, 200)}${supplier.products.length > 200 ? '...' : ''}</p>` 
                            : ''}
                    </div>
                    <div class="col-auto">
                        <span class="score-badge">
                            Score: ${supplier.score || 0}/100
                        </span>
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function showError(message) {
    document.getElementById('projectHeader').innerHTML = `
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> ${message}
        </div>
    `;
}
</script>
</body>
</html>
