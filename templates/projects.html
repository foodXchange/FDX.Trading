<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - FoodXchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .project-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .project-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .supplier-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-right: 5px;
        }
        
        .no-projects {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
    </style>
</head>
<body>
<!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-globe"></i> FoodXchange
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/suppliers">
                        <i class="bi bi-robot"></i> AI Supplier Search
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/projects" aria-current="page">
                        <i class="bi bi-folder2"></i> My Projects
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i> udi@fdx.trading
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Profile</a></li>
                        <li><a class="dropdown-item" href="/settings"><i class="bi bi-gear"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>My Projects</h1>
        <a href="/suppliers" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> New Project
        </a>
    </div>
    
    <div id="projectsList">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Load projects when page loads
document.addEventListener('DOMContentLoaded', loadProjects);

async function loadProjects() {
    try {
        const response = await fetch('/api/projects');
        const data = await response.json();
        
        if (data.error) {
            showError(data.error);
            return;
        }
        
        displayProjects(data.projects);
    } catch (error) {
        showError('Failed to load projects');
    }
}

function displayProjects(projects) {
    const container = document.getElementById('projectsList');
    
    if (!projects || projects.length === 0) {
        container.innerHTML = `
            <div class="no-projects">
                <i class="bi bi-folder2-open" style="font-size: 4rem; color: #ccc;"></i>
                <h3 class="mt-3">No Projects Yet</h3>
                <p>Start by searching for suppliers and adding them to a project.</p>
                <a href="/suppliers" class="btn btn-primary mt-3">
                    <i class="bi bi-search"></i> Search Suppliers
                </a>
            </div>
        `;
        return;
    }
    
    let html = '';
    projects.forEach(project => {
        const createdDate = new Date(project.created_at).toLocaleDateString();
        
        html += `
            <div class="project-card">
                <div class="row">
                    <div class="col">
                        <h4>${project.project_name}</h4>
                        ${project.description ? `<p class="text-muted">${project.description}</p>` : ''}
                        <p class="mb-2">
                            <small class="text-muted">
                                Created on ${createdDate} • 
                                ${project.supplier_count} suppliers
                            </small>
                        </p>
                        <div class="mt-2">
                            ${project.suppliers.slice(0, 3).map(s => 
                                `<span class="supplier-badge">${s.supplier_name} (${s.supplier_country})</span>`
                            ).join('')}
                            ${project.suppliers.length > 3 ? 
                                `<span class="text-muted">+${project.suppliers.length - 3} more</span>` : ''}
                        </div>
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-outline-primary btn-sm" onclick="viewProject(${project.id})">
                            <i class="bi bi-eye"></i> View
                        </button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteProject(${project.id}, '${project.project_name}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function showError(message) {
    document.getElementById('projectsList').innerHTML = `
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> ${message}
        </div>
    `;
}

async function viewProject(projectId) {
    // Navigate to project details page
    window.location.href = `/project?id=${projectId}`;
}

async function deleteProject(projectId, projectName) {
    if (!confirm(`Are you sure you want to delete "${projectName}"?`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/projects/${projectId}`, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.error) {
            alert('Error: ' + data.error);
            return;
        }
        
        alert('Project deleted successfully');
        loadProjects(); // Reload the list
        
    } catch (error) {
        alert('Error deleting project');
    }
}
</script>
</body>
</html>
