<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title | default('Food Xchange') }}{% endblock %} - Food Xchange</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Food Xchange Custom Fonts -->
    <link rel="stylesheet" href="/static/brand/fx-fonts.css">
    <link rel="stylesheet" href="/static/brand/fx-complete.css">
    
    <!-- Custom Bootstrap Overrides -->
    <style>
        :root {
            --bs-primary: #4A90E2;
            --bs-secondary: #F97316;
            --bs-success: #10B981;
            --bs-info: #4A90E2;
            --bs-warning: #F97316;
            --bs-danger: #EF4444;
        }
        
        body {
            font-family: 'Roboto Serif', serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'David Libre', serif;
            font-weight: 600;
        }
        
        .btn, .form-control, .form-label {
            font-family: 'Causten', sans-serif;
        }
        
        .navbar-brand {
            font-family: 'David Libre', serif;
            font-weight: 600;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm border-bottom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="/static/brand/logos/Favicon.png" alt="Food Xchange" height="32" class="me-2">
                <span class="text-primary">Food Xchange</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bootstrap/rfq">RFQ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bootstrap/orders">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bootstrap/analytics">Analytics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/bootstrap/help">Help</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="bg-light border-top mt-5">
        <div class="container py-4">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="text-primary">Food Xchange</h5>
                    <p class="text-muted">B2B Food Marketplace Platform</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted">&copy; 2024 Food Xchange. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script>
        // Food Xchange API Integration
        const API_BASE = '/api';
        
        async function callAPI(endpoint, data = null) {
            try {
                const options = {
                    method: data ? 'POST' : 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                
                if (data) {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(API_BASE + endpoint, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: 'Failed to connect to server' };
            }
        }
        
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
            alertDiv.style.zIndex = '9999';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
