{% extends "base.html" %}

{% block title %}Login - FoodXchange{% endblock %}

{% block extra_css %}
<style>
    body { 
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); 
        min-height: 100vh; 
    }
    .login-card { 
        backdrop-filter: blur(10px); 
        background: rgba(255, 255, 255, 0.9); 
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-4">
            <div class="card login-card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h3 class="text-primary">
                            <i class="fas fa-exchange-alt me-2"></i>FoodXchange
                        </h3>
                        <p class="text-muted">AI-Powered Food Sourcing Platform</p>
                    </div>
                    
                    <form action="{{ url_for('simple_login') }}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{{ url_for('admin_login') }}" class="btn btn-outline-secondary btn-sm">
                            <i class="fas fa-user-shield me-2"></i>Admin Access
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
