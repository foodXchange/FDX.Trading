<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog - FDX Trading</title>
    <link rel="stylesheet" href="/css/smart-navigation.css">
    <style>
        /* Product-specific styles */
        .filters-sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .filter-section {
            margin-bottom: 24px;
        }

        .filter-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
        }

        .filter-option input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .filter-option label {
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
            flex: 1;
        }

        .filter-count {
            font-size: 12px;
            color: #94a3b8;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .price-range {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .price-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .results-info {
            font-size: 14px;
            color: #64748b;
        }

        .sort-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 4px;
        }

        .view-btn {
            padding: 6px 10px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            color: #64748b;
        }

        .view-btn.active {
            background: #6366f1;
            color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .products-list {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .products-list.active {
            display: flex;
        }

        .products-grid.list-view {
            display: none;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #6366f1;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #6366f1;
        }

        .product-body {
            padding: 16px;
        }

        .product-category {
            font-size: 12px;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-description {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #94a3b8;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }

        .product-unit {
            font-size: 12px;
            color: #94a3b8;
        }

        .product-actions {
            display: flex;
            gap: 8px;
        }

        .product-btn {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-favorite {
            background: #fee2e2;
            color: #ef4444;
        }

        .btn-favorite:hover {
            background: #fecaca;
        }

        .btn-cart {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-cart:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .badge-new {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .badge-sale {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .badge-kosher {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
        }

        /* List view styles */
        .product-list-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .product-list-item:hover {
            border-color: #6366f1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .product-list-image {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #6366f1;
            flex-shrink: 0;
        }

        .product-list-content {
            flex: 1;
        }

        .product-list-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .product-list-details {
            display: flex;
            gap: 24px;
            margin-top: 12px;
        }

        .detail-item {
            font-size: 14px;
            color: #64748b;
        }

        .detail-label {
            font-weight: 600;
            color: #334155;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .empty-text {
            margin-bottom: 24px;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .content-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            
            .filters-sidebar {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <!-- Page Header -->
    <div class="page-header">
        <div class="page-title-section">
            <div class="page-breadcrumb">
                <a href="/dashboard.html" class="breadcrumb-link">Home</a>
                <span>›</span>
                <span>Product Catalog</span>
            </div>
            <h1 class="page-title">Products</h1>
            <p class="page-subtitle">Browse our extensive catalog of quality products</p>
        </div>
        <div class="page-actions">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="productSearch" placeholder="Search products...">
            </div>
            <button class="btn btn-primary" onclick="showAddProduct()">
                <span>➕</span>
                <span>Add Product</span>
            </button>
        </div>
    </div>

    <div class="content-layout">
        <!-- Filters Sidebar -->
        <div class="filters-sidebar">
            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 20px;">Filters</h3>
            
            <!-- Categories -->
            <div class="filter-section">
                <div class="filter-title">Categories</div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-food">
                    <label for="cat-food">Food & Beverages</label>
                    <span class="filter-count">124</span>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-dairy">
                    <label for="cat-dairy">Dairy Products</label>
                    <span class="filter-count">87</span>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-meat">
                    <label for="cat-meat">Meat & Poultry</label>
                    <span class="filter-count">65</span>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-produce">
                    <label for="cat-produce">Fresh Produce</label>
                    <span class="filter-count">92</span>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="cat-frozen">
                    <label for="cat-frozen">Frozen Foods</label>
                    <span class="filter-count">43</span>
                </div>
            </div>

            <!-- Kosher Filter -->
            <div class="filter-section">
                <div class="filter-title">Kosher Certification</div>
                <div class="filter-option">
                    <input type="checkbox" id="kosher-yes">
                    <label for="kosher-yes">Kosher Certified</label>
                    <span class="filter-count">156</span>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="kosher-pending">
                    <label for="kosher-pending">Certification Pending</label>
                    <span class="filter-count">23</span>
                </div>
            </div>

            <!-- Price Range -->
            <div class="filter-section">
                <div class="filter-title">Price Range</div>
                <div class="price-range">
                    <input type="number" class="price-input" placeholder="Min" id="priceMin">
                    <span>-</span>
                    <input type="number" class="price-input" placeholder="Max" id="priceMax">
                </div>
            </div>

            <!-- Availability -->
            <div class="filter-section">
                <div class="filter-title">Availability</div>
                <div class="filter-option">
                    <input type="checkbox" id="avail-stock">
                    <label for="avail-stock">In Stock</label>
                    <span class="filter-count">298</span>
                </div>
                <div class="filter-option">
                    <input type="checkbox" id="avail-order">
                    <label for="avail-order">Available to Order</label>
                    <span class="filter-count">89</span>
                </div>
            </div>

            <!-- Apply/Reset -->
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="applyFilters()">Apply Filters</button>
                <button class="btn btn-secondary" style="flex: 1;" onclick="resetFilters()">Reset</button>
            </div>
        </div>

        <!-- Products Section -->
        <div>
            <!-- Products Header -->
            <div class="products-header">
                <div class="results-info">
                    Showing <strong id="resultCount">24</strong> of <strong id="totalCount">412</strong> products
                </div>
                <div class="sort-controls">
                    <select class="sort-select" id="sortSelect" onchange="sortProducts()">
                        <option value="relevance">Most Relevant</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="name">Name: A-Z</option>
                        <option value="newest">Newest First</option>
                    </select>
                    <div class="view-toggle">
                        <button class="view-btn active" onclick="setView('grid')">
                            <span>⊞</span>
                        </button>
                        <button class="view-btn" onclick="setView('list')">
                            <span>☰</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="productsGrid">
                <!-- Product cards will be loaded here -->
            </div>

            <!-- Products List (hidden by default) -->
            <div class="products-list" id="productsList">
                <!-- Product list items will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="content-card empty-state" style="display: none;">
                <div class="empty-icon">📦</div>
                <h2 class="empty-title">No Products Found</h2>
                <p class="empty-text">Try adjusting your filters or search terms</p>
                <button class="btn btn-primary" onclick="resetFilters()">Clear Filters</button>
            </div>
        </div>
    </div>

    <!-- Load Smart Navigation -->
    <script src="/js/smart-navigation.js"></script>
    
    <!-- Page-specific JavaScript -->
    <script>
        let products = [];
        let filteredProducts = [];
        let currentView = 'grid';

        async function loadProducts() {
            // Mock data for demonstration
            products = [
                {
                    id: 1,
                    name: 'Premium Olive Oil',
                    category: 'Food & Beverages',
                    price: 24.99,
                    unit: 'per liter',
                    description: 'Extra virgin olive oil from Mediterranean orchards',
                    kosher: true,
                    inStock: true,
                    badge: 'new',
                    supplier: 'Mediterranean Imports',
                    minOrder: '12 units'
                },
                {
                    id: 2,
                    name: 'Organic Whole Milk',
                    category: 'Dairy Products',
                    price: 4.99,
                    unit: 'per gallon',
                    description: 'Fresh organic whole milk from local farms',
                    kosher: true,
                    inStock: true,
                    badge: 'kosher',
                    supplier: 'Local Dairy Co.',
                    minOrder: '6 units'
                },
                {
                    id: 3,
                    name: 'Premium Beef Cuts',
                    category: 'Meat & Poultry',
                    price: 18.99,
                    unit: 'per kg',
                    description: 'High-quality beef cuts, grass-fed and hormone-free',
                    kosher: true,
                    inStock: false,
                    badge: 'sale',
                    supplier: 'Quality Meats Inc.',
                    minOrder: '20 kg'
                },
                {
                    id: 4,
                    name: 'Fresh Tomatoes',
                    category: 'Fresh Produce',
                    price: 3.49,
                    unit: 'per kg',
                    description: 'Vine-ripened tomatoes, perfect for salads and cooking',
                    kosher: false,
                    inStock: true,
                    supplier: 'Green Valley Farms',
                    minOrder: '10 kg'
                },
                {
                    id: 5,
                    name: 'Frozen Mixed Vegetables',
                    category: 'Frozen Foods',
                    price: 6.99,
                    unit: 'per bag',
                    description: 'Premium quality frozen vegetable mix',
                    kosher: true,
                    inStock: true,
                    badge: 'kosher',
                    supplier: 'FrostFresh Foods',
                    minOrder: '24 bags'
                },
                {
                    id: 6,
                    name: 'Artisan Bread',
                    category: 'Food & Beverages',
                    price: 5.99,
                    unit: 'per loaf',
                    description: 'Freshly baked artisan bread with traditional recipes',
                    kosher: true,
                    inStock: true,
                    badge: 'new',
                    supplier: 'Bakery Delights',
                    minOrder: '12 loaves'
                }
            ];
            
            // Duplicate for more items
            products = [...products, ...products.map(p => ({...p, id: p.id + 100}))];
            
            filteredProducts = [...products];
            displayProducts();
        }

        function displayProducts() {
            const gridContainer = document.getElementById('productsGrid');
            const listContainer = document.getElementById('productsList');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredProducts.length === 0) {
                gridContainer.style.display = 'none';
                listContainer.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            // Update counts
            document.getElementById('resultCount').textContent = filteredProducts.length;
            document.getElementById('totalCount').textContent = products.length;
            
            // Grid view
            gridContainer.innerHTML = filteredProducts.map(product => {
                const badgeHtml = product.badge ? `
                    <span class="product-badge badge-${product.badge}">
                        ${product.badge === 'new' ? 'NEW' : product.badge === 'sale' ? 'SALE' : 'KOSHER'}
                    </span>
                ` : '';
                
                return `
                    <div class="product-card" onclick="viewProduct(${product.id})" style="position: relative;">
                        ${badgeHtml}
                        <div class="product-image">📦</div>
                        <div class="product-body">
                            <div class="product-category">${product.category}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-description">${product.description}</div>
                            <div class="product-meta">
                                <div class="meta-item">
                                    <span>🏢</span>
                                    <span>${product.supplier}</span>
                                </div>
                                ${product.kosher ? '<div class="meta-item"><span>✅</span><span>Kosher</span></div>' : ''}
                            </div>
                            <div class="product-footer">
                                <div>
                                    <div class="product-price">$${product.price}</div>
                                    <div class="product-unit">${product.unit}</div>
                                </div>
                                <div class="product-actions">
                                    <button class="product-btn btn-favorite" onclick="event.stopPropagation(); toggleFavorite(${product.id})">
                                        ❤️
                                    </button>
                                    <button class="product-btn btn-cart" onclick="event.stopPropagation(); addToCart(${product.id})">
                                        🛒
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // List view
            listContainer.innerHTML = filteredProducts.map(product => `
                <div class="product-list-item" onclick="viewProduct(${product.id})">
                    <div class="product-list-image">📦</div>
                    <div class="product-list-content">
                        <div class="product-list-header">
                            <div>
                                <div class="product-category">${product.category}</div>
                                <div class="product-name">${product.name}</div>
                                <div class="product-description">${product.description}</div>
                            </div>
                            <div>
                                <div class="product-price">$${product.price}</div>
                                <div class="product-unit">${product.unit}</div>
                            </div>
                        </div>
                        <div class="product-list-details">
                            <div class="detail-item">
                                <span class="detail-label">Supplier:</span> ${product.supplier}
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Min Order:</span> ${product.minOrder}
                            </div>
                            ${product.kosher ? '<div class="detail-item"><span class="detail-label">✅ Kosher Certified</span></div>' : ''}
                            <div class="detail-item">
                                <span class="detail-label">Status:</span> ${product.inStock ? '✅ In Stock' : '❌ Out of Stock'}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setView(view) {
            currentView = view;
            const gridContainer = document.getElementById('productsGrid');
            const listContainer = document.getElementById('productsList');
            const viewButtons = document.querySelectorAll('.view-btn');
            
            viewButtons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (view === 'grid') {
                gridContainer.style.display = 'grid';
                listContainer.classList.remove('active');
            } else {
                gridContainer.style.display = 'none';
                listContainer.classList.add('active');
            }
        }

        function viewProduct(id) {
            alert(`View product ${id} details`);
        }

        function toggleFavorite(id) {
            alert(`Toggle favorite for product ${id}`);
        }

        function addToCart(id) {
            alert(`Add product ${id} to cart`);
        }

        function applyFilters() {
            // Apply filters logic
            alert('Filters applied');
        }

        function resetFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('priceMin').value = '';
            document.getElementById('priceMax').value = '';
            filteredProducts = [...products];
            displayProducts();
        }

        function sortProducts() {
            const sortValue = document.getElementById('sortSelect').value;
            
            switch(sortValue) {
                case 'price-low':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'name':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'newest':
                    filteredProducts.sort((a, b) => b.id - a.id);
                    break;
                default:
                    filteredProducts = [...products];
            }
            
            displayProducts();
        }

        function showAddProduct() {
            alert('Add product functionality coming soon');
        }

        // Search functionality
        document.getElementById('productSearch').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            
            if (searchTerm) {
                filteredProducts = products.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.category.toLowerCase().includes(searchTerm) ||
                    p.description.toLowerCase().includes(searchTerm) ||
                    p.supplier.toLowerCase().includes(searchTerm)
                );
            } else {
                filteredProducts = [...products];
            }
            
            displayProducts();
        });

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
