<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FDX Trading Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #48bb78;
            --accent: #ed8936;
            --dark: #0f0f1e;
            --dark-secondary: #1a1a2e;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Navigation */
        .navbar {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            margin: 0 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-link:hover {
            color: #ffffff !important;
        }

        .nav-link.active {
            color: #667eea !important;
        }

        /* Page Header */
        .page-header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
        }

        /* Search and Filters */
        .search-section {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-box {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }

        /* Category Filters */
        .category-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
        }

        /* Stats Overview */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 0 2rem;
            max-width: 1400px;
            margin: 0 auto 2rem;
        }

        .stat-mini {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-mini-value {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-mini-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 0 2rem;
            max-width: 1400px;
            margin: 0 auto 2rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gradient);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .product-content {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.5rem;
        }

        .product-category {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .product-supplier {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .stars {
            color: #f59e0b;
        }

        .rating-value {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-add-cart {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-add-cart:hover {
            background: var(--secondary);
            color: white;
            transform: scale(1.05);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 4rem;
            grid-column: 1/-1;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .view-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.8);
        }

        .view-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--primary);
        }

        .view-btn.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
        }

        /* List View */
        .products-list .product-card {
            display: flex;
            align-items: center;
            max-width: 100%;
        }

        .products-list .product-image {
            width: 150px;
            height: 150px;
            flex-shrink: 0;
        }

        .products-list .product-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                padding: 0 1rem;
            }

            .stats-overview {
                grid-template-columns: 1fr 1fr;
                padding: 0 1rem;
            }

            .category-filters {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center w-100">
                <a href="/" class="navbar-brand">
                    <i class="fas fa-chart-line"></i> FDX Trading
                </a>
                <div class="nav-links d-flex">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/modern-dashboard.html" class="nav-link">Dashboard</a>
                    <a href="/intelligent-search.html" class="nav-link">AI Search</a>
                    <a href="/supplier-catalog.html" class="nav-link">Suppliers</a>
                    <a href="/product-catalog.html" class="nav-link active">Products</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Product Catalog</h1>
        <p class="subtitle">Discover premium products from verified suppliers</p>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" 
                   id="searchInput" 
                   class="search-input" 
                   placeholder="Search products by name, category, or supplier..."
                   onkeyup="filterProducts()">
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- Category Filters -->
        <div class="category-filters">
            <button class="category-btn active" onclick="setCategory('all', this)">
                <span>🛍️</span> All Products
            </button>
            <button class="category-btn" onclick="setCategory('oils', this)">
                <span>🫒</span> Oils
            </button>
            <button class="category-btn" onclick="setCategory('pasta', this)">
                <span>🍝</span> Pasta
            </button>
            <button class="category-btn" onclick="setCategory('snacks', this)">
                <span>🍿</span> Snacks
            </button>
            <button class="category-btn" onclick="setCategory('chocolate', this)">
                <span>🍫</span> Chocolate
            </button>
            <button class="category-btn" onclick="setCategory('bakery', this)">
                <span>🥐</span> Bakery
            </button>
            <button class="category-btn" onclick="setCategory('organic', this)">
                <span>🌱</span> Organic
            </button>
        </div>

        <!-- View Toggle -->
        <div class="view-toggle">
            <button class="view-btn active" onclick="setView('grid', this)">
                <i class="fas fa-th"></i> Grid View
            </button>
            <button class="view-btn" onclick="setView('list', this)">
                <i class="fas fa-list"></i> List View
            </button>
        </div>
    </div>

    <!-- Stats Overview -->
    <div class="stats-overview">
        <div class="stat-mini">
            <div class="stat-mini-value" id="totalProducts">280</div>
            <div class="stat-mini-label">Total Products</div>
        </div>
        <div class="stat-mini">
            <div class="stat-mini-value">14</div>
            <div class="stat-mini-label">Categories</div>
        </div>
        <div class="stat-mini">
            <div class="stat-mini-value">51</div>
            <div class="stat-mini-label">Suppliers</div>
        </div>
        <div class="stat-mini">
            <div class="stat-mini-value">4.6</div>
            <div class="stat-mini-label">Avg Rating</div>
        </div>
    </div>

    <!-- Products Grid -->
    <div class="products-grid" id="productsGrid">
        <div class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: rgba(255, 255, 255, 0.6);">Loading products...</p>
        </div>
    </div>

    <script>
        // Sample product data
        const products = [
            {
                name: "Extra Virgin Olive Oil Premium",
                category: "oils",
                supplier: "Mueloliva Spain",
                price: 24.99,
                rating: 4.8,
                icon: "🫒",
                badge: "Premium"
            },
            {
                name: "Artisan Pasta Collection",
                category: "pasta",
                supplier: "Bergia Mediterranean Foods",
                price: 12.99,
                rating: 4.6,
                icon: "🍝",
                badge: "Bestseller"
            },
            {
                name: "Dark Chocolate Spread",
                category: "chocolate",
                supplier: "Nutkao Italia",
                price: 8.99,
                rating: 4.7,
                icon: "🍫",
                badge: "New"
            },
            {
                name: "Premium Frozen Vegetables",
                category: "frozen",
                supplier: "Ardo Belgium",
                price: 6.99,
                rating: 4.5,
                icon: "🥦",
                badge: "Organic"
            },
            {
                name: "Italian Ladyfinger Cookies",
                category: "bakery",
                supplier: "Matilde Vicenzi",
                price: 9.99,
                rating: 4.9,
                icon: "🍪",
                badge: "Premium"
            },
            {
                name: "Traditional Stroopwafels",
                category: "snacks",
                supplier: "Daelmans Stroopwafels",
                price: 7.99,
                rating: 4.8,
                icon: "🧇",
                badge: "Traditional"
            },
            {
                name: "Organic Olive Oil",
                category: "oils",
                supplier: "Kadooğlu Yağ",
                price: 19.99,
                rating: 4.4,
                icon: "🫒",
                badge: "Organic"
            },
            {
                name: "Premium Biscotti",
                category: "bakery",
                supplier: "Coppenrath Feingebäck",
                price: 11.99,
                rating: 4.7,
                icon: "🥖",
                badge: "Premium"
            },
            {
                name: "Mediterranean Pasta Sauce",
                category: "pasta",
                supplier: "Bergia Mediterranean Foods",
                price: 5.99,
                rating: 4.5,
                icon: "🍅",
                badge: "Classic"
            },
            {
                name: "Hazelnut Chocolate Cream",
                category: "chocolate",
                supplier: "Nutkao Italia",
                price: 10.99,
                rating: 4.8,
                icon: "🌰",
                badge: "Bestseller"
            },
            {
                name: "Gourmet Cookie Selection",
                category: "bakery",
                supplier: "Matilde Vicenzi",
                price: 14.99,
                rating: 4.9,
                icon: "🍪",
                badge: "Gourmet"
            },
            {
                name: "Premium Snack Mix",
                category: "snacks",
                supplier: "Various Suppliers",
                price: 8.49,
                rating: 4.3,
                icon: "🥨",
                badge: "Variety"
            }
        ];

        let currentCategory = 'all';
        let currentView = 'grid';

        // Load products on page load
        window.onload = function() {
            setTimeout(() => {
                displayProducts(products);
            }, 1000);
        };

        function displayProducts(productsToShow) {
            const grid = document.getElementById('productsGrid');
            
            if (productsToShow.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <i class="fas fa-search" style="font-size: 3rem; color: rgba(255, 255, 255, 0.3);"></i>
                        <p style="margin-top: 1rem; color: rgba(255, 255, 255, 0.5);">No products found</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = productsToShow.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
                        <span style="font-size: 4rem;">${product.icon}</span>
                    </div>
                    <div class="product-content">
                        <div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-category">${product.category.charAt(0).toUpperCase() + product.category.slice(1)}</div>
                            <div class="product-supplier">
                                <i class="fas fa-building"></i> ${product.supplier}
                            </div>
                            <div class="product-rating">
                                <span class="stars">
                                    ${generateStars(product.rating)}
                                </span>
                                <span class="rating-value">${product.rating}</span>
                            </div>
                        </div>
                        <div class="product-footer">
                            <span class="product-price">$${product.price}</span>
                            <button class="btn-add-cart" onclick="addToCart('${product.name}')">
                                <i class="fas fa-shopping-cart"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Update count
            document.getElementById('totalProducts').textContent = productsToShow.length;

            // Apply view mode
            if (currentView === 'list') {
                grid.classList.add('products-list');
            } else {
                grid.classList.remove('products-list');
            }
        }

        function generateStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            let stars = '';
            
            for (let i = 0; i < fullStars; i++) {
                stars += '<i class="fas fa-star"></i>';
            }
            if (hasHalfStar) {
                stars += '<i class="fas fa-star-half-alt"></i>';
            }
            for (let i = fullStars + (hasHalfStar ? 1 : 0); i < 5; i++) {
                stars += '<i class="far fa-star"></i>';
            }
            
            return stars;
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = products;
            
            // Apply category filter
            if (currentCategory !== 'all') {
                filtered = filtered.filter(product => 
                    product.category === currentCategory ||
                    (currentCategory === 'organic' && product.badge === 'Organic')
                );
            }
            
            // Apply search filter
            if (searchTerm) {
                filtered = filtered.filter(product => 
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.category.toLowerCase().includes(searchTerm) ||
                    product.supplier.toLowerCase().includes(searchTerm)
                );
            }
            
            displayProducts(filtered);
        }

        function setCategory(category, element) {
            currentCategory = category;
            
            // Update active state
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // Apply filter
            filterProducts();
        }

        function setView(view, element) {
            currentView = view;
            
            // Update active state
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // Re-display products with new view
            filterProducts();
        }

        function addToCart(productName) {
            alert(`Added ${productName} to cart!`);
        }
    </script>
</body>
</html>
