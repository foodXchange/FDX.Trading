<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDX Trading - Login</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Theme initialization MUST come first -->
    <script src="js/theme-init.js"></script>
    
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        /* Dark mode styles */
        body.dark-mode {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        
        body.dark-mode .login-container {
            background: #1e293b;
            color: #e2e8f0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        body.dark-mode h2 {
            color: #f1f5f9;
        }
        
        body.dark-mode .input-group label {
            color: #cbd5e1;
        }
        
        body.dark-mode .input-group input {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }
        
        body.dark-mode .input-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }
        
        body.dark-mode .remember-me label {
            color: #94a3b8;
        }
        
        body.dark-mode .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        body.dark-mode .btn-primary:hover {
            background: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
        }
        
        body.dark-mode .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        body.dark-mode .success-message {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }
        
        /* Mobile responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .login-container {
                padding: 25px;
                border-radius: 15px;
            }
            
            h2 {
                font-size: 24px !important;
            }
            
            input {
                font-size: 16px !important; /* Prevents zoom on iOS */
            }
            
            button {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .tabs {
                margin-bottom: 20px !important;
            }
            
            .tab {
                padding: 8px !important;
                font-size: 14px;
            }
        }
        
        /* Tablet responsive */
        @media (min-width: 481px) and (max-width: 768px) {
            .login-container {
                padding: 35px;
            }
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .welcome {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .welcome h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .logout-btn {
            background: #dc3545;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <h2>Welcome Back!</h2>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('login', this)">Login</div>
            <div class="tab" onclick="showTab('register', this)">Register</div>
        </div>
        
        <div id="loginForm" class="form-section active">
            <div class="form-group">
                <label for="loginUsername">Email / Username</label>
                <input type="text" id="loginUsername" name="username" placeholder="Enter email or username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <button onclick="login()" type="button">Login</button>
        </div>
        
        <div id="registerForm" class="form-section">
            <div class="form-group">
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" name="new-username" placeholder="Choose a username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" name="new-password" placeholder="Choose a password" autocomplete="new-password">
            </div>
            <button onclick="register()" type="button">Create Account</button>
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <div class="login-container welcome" id="welcomeScreen">
        <h1>Welcome, <span id="welcomeUser"></span>!</h1>
        <p>You are successfully logged in.</p>
        <p>User ID: <span id="userId"></span></p>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        function showTab(tab, element) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            // If called from onclick, use the element; if called programmatically, find the tab
            if (element) {
                element.classList.add('active');
            } else {
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach(t => {
                    if ((tab === 'login' && t.textContent === 'Login') || 
                        (tab === 'register' && t.textContent === 'Register')) {
                        t.classList.add('active');
                    }
                });
            }
            
            // Update forms
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
            }
            
            // Clear message
            document.getElementById('message').style.display = 'none';
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/login/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Login successful!', 'success');
                    
                    // Store user data in localStorage
                    const userData = {
                        id: data.userId,
                        name: data.username,
                        email: data.email || data.username,
                        role: data.userType,
                        initials: data.username.split(' ').map(n => n[0]).join('').toUpperCase() || 'U'
                    };
                    localStorage.setItem('currentUser', JSON.stringify(userData));
                    
                    // Redirect all users to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Connection error', 'error');
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/login/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Registration successful! You can now login.', 'success');
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Connection error', 'error');
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }
        
        function showWelcome(username, userId) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'block';
            document.getElementById('welcomeUser').textContent = username;
            document.getElementById('userId').textContent = userId;
        }
        
        function logout() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('message').style.display = 'none';
        }
    </script>
    
    <!-- Global Settings Manager -->
    <script src="/js/global-settings.js"></script>
</body>
</html>
