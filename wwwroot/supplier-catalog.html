<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Catalogs - FDX Trading</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .controls button:hover {
            background: #5a67d8;
        }
        .controls select, .controls input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 2em;
        }
        .stat-card p {
            margin: 0;
            color: #666;
        }
        .suppliers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .supplier-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .supplier-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .supplier-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
        }
        .supplier-header h3 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
        }
        .supplier-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 0.9em;
        }
        .supplier-body {
            padding: 15px;
        }
        .supplier-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .supplier-stat {
            text-align: center;
        }
        .supplier-stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        .supplier-stat-label {
            font-size: 0.8em;
            color: #666;
        }
        .badges {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            background: #f0f0f0;
        }
        .badge.kosher {
            background: #e3f2fd;
            color: #1976d2;
        }
        .badge.organic {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .suppliers-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .controls button,
            .controls select,
            .controls input {
                width: 100%;
            }
            
            .modal-content {
                margin: 20px;
                width: calc(100% - 40px);
                max-height: 90vh;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .supplier-card {
                margin: 0 5px;
            }
            
            .supplier-stats {
                flex-direction: column;
                gap: 10px;
            }
        }
        
        .products-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 20px;
            width: 90%;
            max-width: 1200px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }
        .close:hover {
            color: #333;
        }
        .products-table {
            width: 100%;
            border-collapse: collapse;
        }
        .products-table th {
            background: #f5f5f5;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        .products-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .products-table tr:hover {
            background: #f9f9f9;
        }
        .import-section {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .import-section h3 {
            margin-top: 0;
            color: #856404;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Supplier Product Catalogs</h1>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3 id="totalSuppliers">0</h3>
                <p>Total Suppliers</p>
            </div>
            <div class="stat-card">
                <h3 id="totalProducts">0</h3>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <h3 id="totalCategories">0</h3>
                <p>Categories</p>
            </div>
            <div class="stat-card">
                <h3 id="activeSuppliers">0</h3>
                <p>Active Suppliers</p>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search suppliers..." style="flex: 1;">
            <select id="countryFilter">
                <option value="">All Countries</option>
            </select>
            <select id="categoryFilter">
                <option value="">All Categories</option>
            </select>
            <button onclick="loadSuppliers()">🔄 Refresh</button>
            <button onclick="showImportDialog()">📥 Import CSV</button>
        </div>

        <div class="import-section" id="importSection" style="display: none;">
            <h3>Import Products from CSV</h3>
            <p>CSV File Path: <input type="text" id="csvPath" value="C:\Users\fdxadmin\Downloads\Products 9_8_2025.csv" style="width: 500px;"></p>
            <button onclick="importCSV()">Start Import</button>
            <div id="importResult"></div>
        </div>

        <div id="suppliersGrid" class="suppliers-grid">
            <div class="loading">Loading suppliers...</div>
        </div>
    </div>

    <!-- Products Modal -->
    <div id="productsModal" class="products-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Supplier Products</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        let suppliers = [];
        let products = [];

        async function loadSuppliers() {
            try {
                const response = await fetch('/api/products/suppliers/catalog-summary');
                suppliers = await response.json();
                
                displaySuppliers(suppliers);
                updateStats();
                updateFilters();
            } catch (error) {
                console.error('Error loading suppliers:', error);
                document.getElementById('suppliersGrid').innerHTML = '<div class="loading">Error loading suppliers</div>';
            }
        }

        function displaySuppliers(suppliersToShow) {
            const grid = document.getElementById('suppliersGrid');
            
            if (suppliersToShow.length === 0) {
                grid.innerHTML = '<div class="loading">No suppliers found</div>';
                return;
            }

            grid.innerHTML = suppliersToShow.map(supplier => `
                <div class="supplier-card" onclick="viewSupplierProducts(${supplier.supplierId})">
                    <div class="supplier-header">
                        <h3>${supplier.companyName || 'Unknown Supplier'}</h3>
                        <p>📍 ${supplier.country || 'Unknown'}</p>
                    </div>
                    <div class="supplier-body">
                        <div class="supplier-stats">
                            <div class="supplier-stat">
                                <div class="supplier-stat-value">${supplier.productCount || 0}</div>
                                <div class="supplier-stat-label">Products</div>
                            </div>
                            <div class="supplier-stat">
                                <div class="supplier-stat-value">${supplier.categories || 0}</div>
                                <div class="supplier-stat-label">Categories</div>
                            </div>
                            <div class="supplier-stat">
                                <div class="supplier-stat-value">$${(supplier.totalValue || 0).toFixed(0)}</div>
                                <div class="supplier-stat-label">Total Value</div>
                            </div>
                        </div>
                        <div class="badges">
                            ${supplier.hasKosherProducts ? '<span class="badge kosher">Kosher</span>' : ''}
                            ${supplier.hasOrganicProducts ? '<span class="badge organic">Organic</span>' : ''}
                        </div>
                        ${supplier.latestProduct ? `<p style="margin-top: 10px; font-size: 0.9em; color: #666;">Latest: ${supplier.latestProduct}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function viewSupplierProducts(supplierId) {
            try {
                const response = await fetch(`/api/products/supplier/${supplierId}`);
                const data = await response.json();
                
                const modal = document.getElementById('productsModal');
                const modalTitle = document.getElementById('modalTitle');
                const modalBody = document.getElementById('modalBody');
                
                modalTitle.textContent = `${data.supplier.companyName} - Product Catalog (${data.productCount} products)`;
                
                if (data.products.length === 0) {
                    modalBody.innerHTML = '<p>No products found for this supplier.</p>';
                } else {
                    modalBody.innerHTML = `
                        <div style="margin-bottom: 15px;">
                            <strong>Email:</strong> ${data.supplier.email || 'N/A'} | 
                            <strong>Website:</strong> ${data.supplier.website || 'N/A'}
                        </div>
                        <table class="products-table">
                            <thead>
                                <tr>
                                    <th>Product Code</th>
                                    <th>Product Name</th>
                                    <th>Category</th>
                                    <th>Unit Price</th>
                                    <th>MOQ</th>
                                    <th>Incoterms</th>
                                    <th>Certifications</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.products.map(product => `
                                    <tr>
                                        <td>${product.productCode}</td>
                                        <td>${product.productName}</td>
                                        <td>${product.category || '-'}</td>
                                        <td>${product.currency || '$'}${product.unitPrice || '-'}</td>
                                        <td>${product.moq || '-'}</td>
                                        <td>${product.incoterms || '-'}</td>
                                        <td>
                                            ${product.isKosher ? '✅ Kosher' : ''}
                                            ${product.isOrganic ? '🌿 Organic' : ''}
                                        </td>
                                        <td>${product.status}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
                
                modal.style.display = 'block';
            } catch (error) {
                console.error('Error loading supplier products:', error);
                alert('Error loading products');
            }
        }

        function closeModal() {
            document.getElementById('productsModal').style.display = 'none';
        }

        function updateStats() {
            document.getElementById('totalSuppliers').textContent = suppliers.length;
            document.getElementById('totalProducts').textContent = suppliers.reduce((sum, s) => sum + (s.productCount || 0), 0);
            document.getElementById('totalCategories').textContent = new Set(suppliers.flatMap(s => s.categories || [])).size;
            document.getElementById('activeSuppliers').textContent = suppliers.filter(s => s.productCount > 0).length;
        }

        function updateFilters() {
            const countries = [...new Set(suppliers.map(s => s.country).filter(c => c))].sort();
            const countryFilter = document.getElementById('countryFilter');
            countryFilter.innerHTML = '<option value="">All Countries</option>' + 
                countries.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function showImportDialog() {
            const section = document.getElementById('importSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        }

        async function importCSV() {
            const csvPath = document.getElementById('csvPath').value;
            const resultDiv = document.getElementById('importResult');
            
            resultDiv.innerHTML = '<p>Importing... This may take a few minutes.</p>';
            
            try {
                const response = await fetch('/api/products/import-csv', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ filePath: csvPath })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div style="color: green;">
                            <h4>Import Successful!</h4>
                            <p>${result.message}</p>
                            <ul>
                                <li>Total Rows: ${result.totalRows}</li>
                                <li>Products Created: ${result.productsCreated}</li>
                                <li>Products Updated: ${result.productsUpdated}</li>
                                <li>Suppliers Created: ${result.suppliersCreated}</li>
                            </ul>
                        </div>
                    `;
                    setTimeout(() => loadSuppliers(), 2000);
                } else {
                    resultDiv.innerHTML = `
                        <div style="color: red;">
                            <h4>Import Failed</h4>
                            <p>${result.message || 'Unknown error'}</p>
                            ${result.errors && result.errors.length > 0 ? 
                                '<ul>' + result.errors.slice(0, 5).map(e => `<li>${e}</li>`).join('') + '</ul>' : ''}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = suppliers.filter(s => 
                s.companyName.toLowerCase().includes(search) ||
                (s.latestProduct && s.latestProduct.toLowerCase().includes(search))
            );
            displaySuppliers(filtered);
        });

        // Country filter
        document.getElementById('countryFilter').addEventListener('change', (e) => {
            const country = e.target.value;
            const filtered = country ? suppliers.filter(s => s.country === country) : suppliers;
            displaySuppliers(filtered);
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('productsModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Load suppliers on page load
        loadSuppliers();
    </script>
</body>
</html>
