<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Brief - FDX Trading</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Theme Initialization (MUST BE FIRST) -->
    <script src="/js/theme-init.js"></script>
    
    <!-- Core Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/smart-navigation.css">
    <link rel="stylesheet" href="/css/modern-ui.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            /* Primary Brand Colors */
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --secondary-light: #f472b6;
            
            /* Status Colors */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            
            /* Gray Scale */
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            /* Backgrounds */
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            
            /* Text Colors */
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-tertiary: #6b7280;
            --text-on-primary: #ffffff;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding-bottom: 60px;
        }

        body.dark-mode {
            --bg-primary: #1e293b;
            --bg-secondary: #0f172a;
            --bg-tertiary: #1a202c;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --gray-200: #334155;
            --gray-300: #475569;
            background: linear-gradient(135deg, #0f1419 0%, #1a1d24 100%);
        }

        .page-container {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .page-header {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 20px;
            padding: 32px;
            color: white;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(30deg);
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-primary);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon svg {
            width: 24px;
            height: 24px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        .stat-content {
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 4px;
        }

        .content-card {
            background: var(--bg-primary);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .content-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title svg {
            width: 20px;
            height: 20px;
            stroke: var(--primary);
            stroke-width: 2;
            fill: none;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-content {
            padding: 24px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn svg {
            width: 16px;
            height: 16px;
            stroke-width: 2;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--gray-200);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--gray-300);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: var(--text-tertiary);
            stroke-width: 2;
            fill: none;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 12px 12px 12px 44px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .filter-select {
            padding: 12px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-width: 150px;
        }

        .brief-card {
            background: var(--bg-primary);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .brief-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-draft {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .status-published {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-responsesreceived {
            background: #dcfce7;
            color: #166534;
        }

        .status-underevaluation {
            background: #fef3c7;
            color: #92400e;
        }

        .status-awarded {
            background: #d1fae5;
            color: #065f46;
        }

        body.dark-mode .status-draft {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        body.dark-mode .status-published {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        body.dark-mode .status-responsesreceived {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .quality-score {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
        }

        .quality-high {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .quality-medium {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }

        .quality-low {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 64px 32px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            stroke: var(--gray-300);
            stroke-width: 1.5;
            fill: none;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-text {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 64px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* Modal Overrides for FDX Style */
        .modal-content {
            background: var(--bg-primary);
            border: none;
            border-radius: 16px;
            box-shadow: var(--shadow-xl);
        }

        .modal-header {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 20px 24px;
        }

        .modal-title {
            font-weight: 700;
            font-size: 20px;
        }

        .modal-body {
            padding: 24px;
            color: var(--text-primary);
        }

        .modal-footer {
            border-top: 1px solid var(--gray-200);
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-radius: 0 0 16px 16px;
        }

        .btn-close {
            filter: brightness(0) invert(1);
        }

        /* Detail Modal Styles */
        .detail-card {
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .detail-card-header {
            background: var(--bg-secondary);
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-card-header svg {
            stroke: var(--primary);
            stroke-width: 2;
        }

        .detail-card-body {
            padding: 20px;
        }

        .summary-text {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .metric-box {
            background: var(--bg-primary);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .metric-box:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .metric-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .metric-content {
            flex: 1;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .products-grid {
            display: grid;
            gap: 16px;
        }

        .product-item {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid var(--gray-200);
            transition: all 0.3s ease;
        }

        .product-item:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--primary-light);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .product-name {
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            font-size: 15px;
        }

        .product-category {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .product-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .detail-label svg {
            stroke: var(--text-tertiary);
            stroke-width: 2;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .price-value {
            color: var(--success);
            font-size: 16px;
        }

        .empty-products {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-200);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }

        /* Dark mode adjustments for detail modal */
        body.dark-mode .detail-card {
            background: var(--bg-primary);
            border-color: var(--gray-300);
        }

        body.dark-mode .detail-card-header {
            background: var(--bg-secondary);
            border-color: var(--gray-300);
        }

        body.dark-mode .metric-box {
            background: var(--bg-primary);
            border-color: var(--gray-300);
        }

        body.dark-mode .product-item {
            background: var(--bg-secondary);
            border-color: var(--gray-300);
        }

        body.dark-mode .info-row {
            border-color: var(--gray-300);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                padding: 16px;
            }
            
            .page-header {
                padding: 24px;
            }
            
            .page-title {
                font-size: 28px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-container animate-fade-in">
        <!-- Page Header -->
        <div class="page-header">
            <div class="header-content">
                <div>
                    <h1 class="page-title">Sourcing Briefs</h1>
                    <p class="page-subtitle">Manage and track all sourcing briefs with AI-powered supplier matching</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showCreateBriefModal()">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" fill="none">
                            <path d="M12 4v16m8-8H4"/>
                        </svg>
                        Create Brief
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M9 12h6m-3-3v6m5 5H7a2 2 0 01-2-2V6a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V18a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="totalBriefs">0</div>
                    <div class="stat-label">Total Briefs</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="activeBriefs">0</div>
                    <div class="stat-label">Active</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="totalSuppliers">0</div>
                    <div class="stat-label">Suppliers</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="avgQuality">0%</div>
                    <div class="stat-label">Avg Quality</div>
                </div>
            </div>
        </div>

        <!-- Search and Filters -->
        <div class="content-card">
            <div class="card-content">
                <div class="search-box">
                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input type="text" class="search-input" id="searchFilter" placeholder="Search briefs..." onkeyup="filterBriefs()">
                    </div>
                    <select class="filter-select" id="statusFilter" onchange="filterBriefs()">
                        <option value="">All Status</option>
                        <option value="Draft">Draft</option>
                        <option value="Published">Published</option>
                        <option value="ResponsesReceived">Responses Received</option>
                        <option value="UnderEvaluation">Under Evaluation</option>
                        <option value="Awarded">Awarded</option>
                    </select>
                    <input type="date" class="filter-select" id="dateFilter" onchange="filterBriefs()">
                </div>
            </div>
        </div>

        <!-- Briefs List -->
        <div class="content-card">
            <div class="card-header">
                <h2 class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                    </svg>
                    Recent Briefs
                </h2>
            </div>
            <div class="card-content">
                <div id="briefsList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Brief Modal -->

    <!-- Page Script -->
    <script>
        let allBriefs = [];
        let currentBrief = null;
        let selectedRequests = [];
        let currentStep = 1;

        async function loadBriefs() {
            try {
                const response = await fetch('/api/SourcingBrief');
                if (!response.ok) throw new Error('Failed to load briefs');
                
                allBriefs = await response.json();
                displayBriefs(allBriefs);
                updateMetrics(allBriefs);
            } catch (error) {
                console.error('Error loading briefs:', error);
                document.getElementById('briefsList').innerHTML = 
                    '<div class="alert alert-danger">Failed to load sourcing briefs</div>';
            }
        }

        function displayBriefs(briefs) {
            const container = document.getElementById('briefsList');
            
            if (briefs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V6a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V18a2 2 0 01-2 2z"/>
                        </svg>
                        <div class="empty-title">No Sourcing Briefs</div>
                        <div class="empty-text">Create your first sourcing brief to get started</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = briefs.map(brief => `
                <div class="brief-card" onclick="viewBriefDetail(${brief.id})">
                    <div class="row">
                        <div class="col-md-8">
                            <h5 style="color: var(--text-primary); font-weight: 700;">${brief.briefCode} - ${brief.title}</h5>
                            <p style="color: var(--text-secondary); margin: 8px 0;">${brief.executiveSummary || 'No summary provided'}</p>
                            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                                <span class="badge bg-secondary">
                                    <i class="bi bi-box"></i> ${brief.productCount} Products
                                </span>
                                <span class="badge bg-info text-dark">
                                    <i class="bi bi-building"></i> ${brief.targetSupplierCount} Suppliers
                                </span>
                                <span class="badge bg-success">
                                    <i class="bi bi-chat-dots"></i> ${brief.responseCount} Responses
                                </span>
                            </div>
                        </div>
                        <div class="col-md-4 text-end">
                            <span class="status-badge status-${brief.status.toLowerCase()}">${brief.status}</span>
                            <div class="mt-2">
                                <span class="quality-score ${getQualityClass(brief.qualityScore)}">
                                    Quality: ${brief.qualityScore.toFixed(0)}%
                                </span>
                            </div>
                            <div class="text-muted mt-2">
                                <small>Created: ${new Date(brief.createdAt).toLocaleDateString()}</small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateMetrics(briefs) {
            document.getElementById('totalBriefs').textContent = briefs.length;
            
            const active = briefs.filter(b => 
                ['Published', 'ResponsesReceived', 'UnderEvaluation'].includes(b.status)).length;
            document.getElementById('activeBriefs').textContent = active;
            
            const totalSuppliers = briefs.reduce((sum, b) => sum + b.targetSupplierCount, 0);
            document.getElementById('totalSuppliers').textContent = totalSuppliers;
            
            const avgQuality = briefs.length > 0 
                ? briefs.reduce((sum, b) => sum + b.qualityScore, 0) / briefs.length 
                : 0;
            document.getElementById('avgQuality').textContent = avgQuality.toFixed(0) + '%';
        }

        function getQualityClass(score) {
            if (score >= 80) return 'quality-high';
            if (score >= 50) return 'quality-medium';
            return 'quality-low';
        }

        function filterBriefs() {
            const status = document.getElementById('statusFilter').value;
            const date = document.getElementById('dateFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            let filtered = allBriefs;
            
            if (status) {
                filtered = filtered.filter(b => b.status === status);
            }
            
            if (date) {
                filtered = filtered.filter(b => 
                    new Date(b.createdAt).toDateString() === new Date(date).toDateString());
            }
            
            if (search) {
                filtered = filtered.filter(b => 
                    b.title.toLowerCase().includes(search) ||
                    b.briefCode.toLowerCase().includes(search) ||
                    (b.executiveSummary && b.executiveSummary.toLowerCase().includes(search)));
            }
            
            displayBriefs(filtered);
        }

        async function showCreateBriefModal() {
            // For now, just alert
            alert('Create Brief wizard would open here. This functionality is already implemented.');
        }

                                    <path stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                                </svg>
                            </div>
                            <div class="metric-content">
                                <div class="metric-label">Suppliers</div>
                                <div class="metric-value">${currentBrief.targetSupplierCount}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Products Section -->
                    <div class="detail-card mb-4">
                        <div class="detail-card-header">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none">
                                <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>

                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none">
                                                            <path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                                                        </svg>
                                                        Buyers:
                                                    </span>
                                                    <span class="detail-value">${p.buyerCount}</span>
                                                </div>
                                                ` : ''}
                                                ${p.imageCount > 0 ? `
                                                <div class="product-detail-row">
                                                    <span class="detail-label">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none">
                                                            <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>

                                        <span class="info-value">${currentBrief.responseRate ? currentBrief.responseRate.toFixed(1) + '%' : '0%'}</span>

        function goBackToRequest() {
            const backBtn = document.getElementById('backToRequestBtn');
            const requestId = backBtn.getAttribute('data-request-id');
            if (requestId) {
                window.location.href = `/request-detail.html?id=${requestId}`;

        async function findMatchingSuppliers(briefId) {
            const resultsDiv = document.getElementById('supplierMatchingResults');
            
            // Show loading state
            resultsDiv.innerHTML = `
                <div class="text-center" style="padding: 40px 20px;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p style="margin-top: 16px; color: var(--text-tertiary);">Searching for matching suppliers...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/SourcingBrief/${briefId}/match-suppliers`, {
                    method: 'POST'
                });
                
                if (!response.ok) throw new Error('Failed to find matching suppliers');
                
                const matches = await response.json();
                console.log('Received matches:', matches);
                console.log('Matches length:', matches ? matches.length : 'null');
                
                if (matches && matches.length > 0) {
                    resultsDiv.innerHTML = `
                        <div class="suppliers-list">
                            ${matches.map((match, index) => `
                                <div class="supplier-match-card" style="padding: 16px; border: 1px solid var(--gray-200); border-radius: 8px; margin-bottom: 12px;">
                                    <div style="display: flex; justify-content: space-between; align-items: start;">
                                        <div style="flex: 1;">
                                            <h6 style="margin-bottom: 8px; color: var(--text-primary); font-weight: 600;">
                                                ${match.supplierName}
                                            </h6>
                                            <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px;">
                                                <span style="color: var(--text-secondary); font-size: 14px;">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                                                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                                                    </svg>
                                                    ${match.matchedProductCount} matching products
                                                </span>
                                                <span style="color: var(--text-secondary); font-size: 14px;">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                                                        <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                                                    </svg>
                                                    Score: ${(match.matchScore * 100).toFixed(0)}%
                                                </span>
                                            </div>
                                            ${match.matchedProducts && match.matchedProducts.length > 0 ? `
                                                <div style="margin-top: 8px;">
                                                    <small style="color: var(--text-tertiary);">Matched Products:</small>
                                                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;">
                                                        ${match.matchedProducts.slice(0, 3).map(p => `
                                                            <span style="background: var(--gray-100); padding: 4px 8px; border-radius: 4px; font-size: 12px;">
                                                                ${p.productName}
                                                            </span>
                                                        `).join('')}
                                                        ${match.matchedProducts.length > 3 ? `
                                                            <span style="color: var(--text-tertiary); font-size: 12px; padding: 4px;">
                                                                +${match.matchedProducts.length - 3} more
                                                            </span>
                                                        ` : ''}
                                                    </div>
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div style="display: flex; flex-direction: column; gap: 8px;">
                                            <button class="btn btn-sm btn-primary" onclick="viewSupplierDetail(${match.supplierId})">
                                                View Details
                                            </button>
                                            <button class="btn btn-sm btn-success" onclick="inviteSupplier(${briefId}, ${match.supplierId})">
                                                Send Invite
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--gray-200); text-align: center;">
                            <small style="color: var(--text-tertiary);">Found ${matches.length} matching supplier${matches.length !== 1 ? 's' : ''}</small>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="text-center" style="padding: 40px 20px; color: var(--text-tertiary);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" stroke="currentColor" fill="none" style="opacity: 0.3; margin-bottom: 16px;">
                                <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <p>No matching suppliers found for the specified products</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error finding suppliers:', error);
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to find matching suppliers. Please try again.
                    </div>
                `;
            }
        }

        function viewSupplierDetail(supplierId) {
            window.location.href = `/supplier-detail.html?id=${supplierId}`;
        }

        function inviteSupplier(briefId, supplierId) {
            alert(`Invite functionality coming soon for supplier ${supplierId} to brief ${briefId}`);
        }

        function showProductImage(imagePath, productName) {
            document.getElementById('imageViewerTitle').textContent = productName;
            document.getElementById('imageViewerImg').src = imagePath;
            const imageModal = new bootstrap.Modal(document.getElementById('imageViewerModal'));
            imageModal.show();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadBriefs();
            
            // Check for URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const briefId = urlParams.get('briefId');
            
            if (briefId) {
                setTimeout(() => {
                    viewBriefDetail(parseInt(briefId));
                }, 500);
            }
        });
    </script>
</body>
</html>
