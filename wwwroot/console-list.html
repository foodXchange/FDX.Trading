<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Management - FDX Trading</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/smart-navigation.css">
    <style>
        /* Console-specific styles */
        body.dark-mode {
            background: #0f172a;
            color: #e2e8f0;
        }

        .filters-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        body.dark-mode .filters-bar {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-label {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }

        body.dark-mode .filter-select {
            background: #0f172a;
            border-color: #475569;
            color: #e2e8f0;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
        }

        body.dark-mode .search-input {
            background: #0f172a;
            border-color: #475569;
            color: #e2e8f0;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .consoles-grid {
            display: grid;
            gap: 20px;
        }

        .console-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
        }

        body.dark-mode .console-card {
            background: #1e293b;
            border-color: #334155;
        }

        .console-card:hover {
            border-color: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        body.dark-mode .console-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .console-code {
            font-size: 14px;
            font-weight: 600;
            color: #6366f1;
        }

        .console-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin: 8px 0;
        }

        body.dark-mode .console-title {
            color: #f1f5f9;
        }

        .console-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #64748b;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-section {
            margin-bottom: 16px;
        }

        .progress-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .console-stages {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stage-tag {
            padding: 4px 12px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 13px;
            color: #475569;
        }

        .stage-current {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .console-actions {
            display: flex;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .console-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-view {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-view:hover {
            background: #e2e8f0;
        }

        .btn-manage {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
        }

        .btn-manage:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: #d1fae5;
            color: #10b981;
        }

        .status-paused {
            background: #fed7aa;
            color: #f97316;
        }

        .status-completed {
            background: #ddd6fe;
            color: #8b5cf6;
        }

        .priority-indicator {
            width: 4px;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            border-radius: 12px 0 0 12px;
        }

        .priority-critical {
            background: #ef4444;
        }

        .priority-high {
            background: #f97316;
        }

        .priority-medium {
            background: #f59e0b;
        }

        .priority-low {
            background: #10b981;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        body.dark-mode .empty-title {
            color: #e2e8f0;
        }

        /* Sorting styles */
        .sort-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-left: auto;
        }

        .sort-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        body.dark-mode .sort-btn {
            background: #0f172a;
            border-color: #475569;
            color: #94a3b8;
        }

        .sort-btn:hover {
            border-color: #6366f1;
            color: #6366f1;
        }

        .sort-btn.active {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
        }

        body.dark-mode .sort-btn.active {
            background: #6366f1;
            border-color: #6366f1;
        }

        .sort-arrow {
            font-size: 12px;
            transition: transform 0.2s;
        }

        .sort-arrow.asc {
            transform: rotate(0deg);
        }

        .sort-arrow.desc {
            transform: rotate(180deg);
        }

        .empty-text {
            margin-bottom: 24px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-mini {
            background: white;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        body.dark-mode .stat-mini {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .stat-mini-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-mini-content {
            flex: 1;
        }

        .stat-mini-value {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }

        body.dark-mode .stat-mini-value {
            color: #f1f5f9;
        }

        .stat-mini-label {
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <!-- Page Header -->
    <div class="page-header">
        <div class="page-title-section">
            <div class="page-breadcrumb">
                <a href="/dashboard.html" class="breadcrumb-link">Home</a>
                <span>›</span>
                <span>Console Management</span>
            </div>
            <h1 class="page-title">Consoles</h1>
            <p class="page-subtitle">Manage and monitor your procurement consoles</p>
        </div>
        <div class="page-actions">
            <button class="btn btn-secondary" onclick="refreshConsoles()">
                <span>🔄</span>
                <span>Refresh</span>
            </button>
            <button class="btn btn-primary" onclick="window.location.href='/requests.html'">
                <span>📝</span>
                <span>View Requests</span>
            </button>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="stats-row">
        <div class="stat-mini">
            <div class="stat-mini-icon">🎛️</div>
            <div class="stat-mini-content">
                <div class="stat-mini-value" id="totalConsoles">0</div>
                <div class="stat-mini-label">Total Consoles</div>
            </div>
        </div>
        <div class="stat-mini">
            <div class="stat-mini-icon">✅</div>
            <div class="stat-mini-content">
                <div class="stat-mini-value" id="activeConsoles">0</div>
                <div class="stat-mini-label">Active</div>
            </div>
        </div>
        <div class="stat-mini">
            <div class="stat-mini-icon">⏸️</div>
            <div class="stat-mini-content">
                <div class="stat-mini-value" id="pausedConsoles">0</div>
                <div class="stat-mini-label">Paused</div>
            </div>
        </div>
        <div class="stat-mini">
            <div class="stat-mini-icon">📊</div>
            <div class="stat-mini-content">
                <div class="stat-mini-value" id="avgProgress">0%</div>
                <div class="stat-mini-label">Avg Progress</div>
            </div>
        </div>
    </div>

    <!-- Filters Bar -->
    <div class="filters-bar">
        <div class="filter-group search-box">
            <div style="position: relative;">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search consoles...">
            </div>
        </div>
        
        <div class="filter-group">
            <label class="filter-label">Status</label>
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="0">Active</option>
                <option value="1">Paused</option>
                <option value="2">Completed</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label class="filter-label">Priority</label>
            <select class="filter-select" id="priorityFilter">
                <option value="">All Priority</option>
                <option value="0">Critical</option>
                <option value="1">High</option>
                <option value="2">Medium</option>
                <option value="3">Low</option>
            </select>
        </div>
        
        <div class="filter-group">
            <label class="filter-label">Stage</label>
            <select class="filter-select" id="stageFilter">
                <option value="">All Stages</option>
                <option value="early">Early (0-30%)</option>
                <option value="mid">Mid (31-70%)</option>
                <option value="late">Late (71-99%)</option>
                <option value="complete">Complete (100%)</option>
            </select>
        </div>
        
        <div class="sort-controls">
            <button class="sort-btn active" id="sortLastUpdated" onclick="setSorting('lastUpdated')">
                <span>Last Updated</span>
                <span class="sort-arrow desc">▲</span>
            </button>
            <button class="sort-btn" id="sortTitle" onclick="setSorting('title')">
                <span>Title</span>
                <span class="sort-arrow">▲</span>
            </button>
            <button class="sort-btn" id="sortProgress" onclick="setSorting('progress')">
                <span>Progress</span>
                <span class="sort-arrow">▲</span>
            </button>
            <button class="sort-btn" id="sortPriority" onclick="setSorting('priority')">
                <span>Priority</span>
                <span class="sort-arrow">▲</span>
            </button>
        </div>
    </div>

    <!-- Consoles List -->
    <div id="consolesList" class="consoles-grid">
        <!-- Consoles will be loaded here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="content-card empty-state" style="display: none;">
        <div class="empty-icon">🎛️</div>
        <h2 class="empty-title">No Consoles Found</h2>
        <p class="empty-text">Consoles will appear here when you create them from approved requests</p>
        <button class="btn btn-primary" onclick="window.location.href='/requests.html'">
            Go to Requests
        </button>
    </div>

    <!-- Load Smart Navigation -->
    <script src="/js/smart-navigation.js"></script>
    
    <!-- Page-specific JavaScript -->
    <script>
        let allConsoles = [];
        let filteredConsoles = [];
        let currentSort = { field: 'lastUpdated', order: 'desc' };

        async function loadConsoles() {
            try {
                const response = await fetch('/api/consoles');
                if (!response.ok) throw new Error('Failed to load consoles');
                
                allConsoles = await response.json();
                // Add lastUpdated field if not present (use modifiedAt or createdAt)
                allConsoles = allConsoles.map(console => ({
                    ...console,
                    lastUpdated: console.modifiedAt || console.createdAt || new Date().toISOString()
                }));
                applyFilters();
                updateStats();
            } catch (error) {
                console.error('Error loading consoles:', error);
                showEmptyState('Error loading consoles. Please try again.');
            }
        }

        function updateStats() {
            document.getElementById('totalConsoles').textContent = allConsoles.length;
            document.getElementById('activeConsoles').textContent = 
                allConsoles.filter(c => c.status === 0).length;
            document.getElementById('pausedConsoles').textContent = 
                allConsoles.filter(c => c.status === 1).length;
            
            if (allConsoles.length > 0) {
                const avgProgress = allConsoles.reduce((sum, c) => {
                    const progress = c.totalStages > 0 
                        ? (c.completedStages / c.totalStages) * 100 
                        : 0;
                    return sum + progress;
                }, 0) / allConsoles.length;
                document.getElementById('avgProgress').textContent = Math.round(avgProgress) + '%';
            } else {
                document.getElementById('avgProgress').textContent = '0%';
            }
        }

        function applyFilters() {
            filteredConsoles = [...allConsoles];
            
            // Search filter
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filteredConsoles = filteredConsoles.filter(c => 
                    c.title.toLowerCase().includes(searchTerm) ||
                    c.consoleCode.toLowerCase().includes(searchTerm) ||
                    c.ownerName?.toLowerCase().includes(searchTerm)
                );
            }
            
            // Status filter
            const statusFilter = document.getElementById('statusFilter').value;
            if (statusFilter) {
                filteredConsoles = filteredConsoles.filter(c => 
                    c.status === parseInt(statusFilter)
                );
            }
            
            // Priority filter
            const priorityFilter = document.getElementById('priorityFilter').value;
            if (priorityFilter) {
                filteredConsoles = filteredConsoles.filter(c => 
                    c.priority === parseInt(priorityFilter)
                );
            }
            
            // Stage filter
            const stageFilter = document.getElementById('stageFilter').value;
            if (stageFilter) {
                filteredConsoles = filteredConsoles.filter(c => {
                    const progress = c.totalStages > 0 
                        ? (c.completedStages / c.totalStages) * 100 
                        : 0;
                    
                    switch(stageFilter) {
                        case 'early': return progress <= 30;
                        case 'mid': return progress > 30 && progress <= 70;
                        case 'late': return progress > 70 && progress < 100;
                        case 'complete': return progress === 100;
                        default: return true;
                    }
                });
            }
            
            // Apply sorting
            sortConsoles();
            displayConsoles();
        }

        function sortConsoles() {
            filteredConsoles.sort((a, b) => {
                let aVal, bVal;
                
                switch(currentSort.field) {
                    case 'lastUpdated':
                        aVal = new Date(a.lastUpdated).getTime();
                        bVal = new Date(b.lastUpdated).getTime();
                        break;
                    case 'title':
                        aVal = a.title.toLowerCase();
                        bVal = b.title.toLowerCase();
                        break;
                    case 'progress':
                        aVal = a.totalStages > 0 ? (a.completedStages / a.totalStages) : 0;
                        bVal = b.totalStages > 0 ? (b.completedStages / b.totalStages) : 0;
                        break;
                    case 'priority':
                        // Lower number = higher priority, so invert for sorting
                        aVal = -a.priority;
                        bVal = -b.priority;
                        break;
                    default:
                        return 0;
                }
                
                if (currentSort.order === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                } else {
                    return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
                }
            });
        }

        function setSorting(field) {
            // Remove active class from all buttons
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            
            // Toggle order if same field, otherwise default to desc
            if (currentSort.field === field) {
                currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.order = 'desc';
            }
            
            // Update button states
            const btn = document.getElementById('sort' + field.charAt(0).toUpperCase() + field.slice(1));
            btn.classList.add('active');
            const arrow = btn.querySelector('.sort-arrow');
            arrow.className = 'sort-arrow ' + currentSort.order;
            
            // Re-apply sorting
            sortConsoles();
            displayConsoles();
        }

        function displayConsoles() {
            const container = document.getElementById('consolesList');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredConsoles.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            container.style.display = 'grid';
            emptyState.style.display = 'none';
            
            container.innerHTML = filteredConsoles.map(console => {
                const progress = console.totalStages > 0 
                    ? Math.round((console.completedStages / console.totalStages) * 100) 
                    : 0;
                
                const statusClass = ['active', 'paused', 'completed'][console.status] || 'active';
                const statusText = ['Active', 'Paused', 'Completed'][console.status] || 'Active';
                const statusIcon = ['✅', '⏸️', '✔️'][console.status] || '✅';
                
                const priorityClass = ['critical', 'high', 'medium', 'low'][console.priority] || 'medium';
                const priorityText = ['Critical', 'High', 'Medium', 'Low'][console.priority] || 'Medium';
                
                return `
                    <div class="console-card" onclick="viewConsole(${console.id})">
                        <div class="priority-indicator priority-${priorityClass}"></div>
                        <div class="console-header">
                            <div>
                                <div class="console-code">${console.consoleCode}</div>
                                <h3 class="console-title">${console.title}</h3>
                            </div>
                            <span class="status-badge status-${statusClass}">${statusIcon} ${statusText}</span>
                        </div>
                        
                        <div class="console-meta">
                            <div class="meta-item">
                                <span>👤</span>
                                <span>${console.ownerName || 'Unknown'}</span>
                            </div>
                            <div class="meta-item">
                                <span>📅</span>
                                <span>${new Date(console.createdAt).toLocaleDateString()}</span>
                            </div>
                            <div class="meta-item">
                                <span>⚡</span>
                                <span>${priorityText} Priority</span>
                            </div>
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-label">
                                <span>Stage ${console.currentStageNumber} of ${console.totalStages}</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%">
                                    ${progress > 10 ? progress + '%' : ''}
                                </div>
                            </div>
                        </div>
                        
                        <div class="console-stages">
                            ${console.currentStageName ? `
                                <span class="stage-tag stage-current">Current: ${console.currentStageName}</span>
                            ` : ''}
                            ${console.nextStageName ? `
                                <span class="stage-tag">Next: ${console.nextStageName}</span>
                            ` : ''}
                        </div>
                        
                        <div class="console-actions">
                            <button class="console-btn btn-view" onclick="event.stopPropagation(); viewConsole(${console.id})">
                                <span>👁️</span>
                                <span>View Details</span>
                            </button>
                            <button class="console-btn btn-manage" onclick="event.stopPropagation(); manageConsole(${console.id})">
                                <span>⚙️</span>
                                <span>Manage</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewConsole(id) {
            window.location.href = `/console-detail.html?id=${id}`;
        }

        function manageConsole(id) {
            // Navigate to console management page
            window.location.href = `/console-manage.html?id=${id}`;
        }

        function refreshConsoles() {
            loadConsoles();
        }

        function showEmptyState(message) {
            const container = document.getElementById('consolesList');
            const emptyState = document.getElementById('emptyState');
            
            container.style.display = 'none';
            emptyState.style.display = 'block';
            
            if (message) {
                emptyState.querySelector('.empty-text').textContent = message;
            }
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        document.getElementById('priorityFilter').addEventListener('change', applyFilters);
        document.getElementById('stageFilter').addEventListener('change', applyFilters);

        // Initialize dark mode from localStorage
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Load consoles on page load
        loadConsoles();
        
        // Auto-refresh every 30 seconds
        setInterval(loadConsoles, 30000);
    </script>
    <script src="/js/theme-init.js"></script>
    <script src="/js/universal-dark-mode-styles.js"></script>
    
    <!-- Global Footer -->
    <link rel="stylesheet" href="/css/global-footer-v2.css">
    <script src="/js/global-footer-v2.js"></script>
</body>
</html>
