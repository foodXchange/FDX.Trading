            <div style="width: 40px; height: 40px; margin-right: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem;">FDX</div>
            <span>FDX Trading</span>
        </a>
        
        <div style="display: flex; gap: 5px;">
            <a href="/dashboard.html" style="padding: 8px 16px; color: #555; text-decoration: none; border-radius: 5px; font-weight: 500;" class="nav-dashboard">Dashboard</a>
            <a href="/requests.html" style="padding: 8px 16px; color: #555; text-decoration: none; border-radius: 5px; font-weight: 500;" class="nav-requests">Requests</a>
            <a href="/products.html" style="padding: 8px 16px; color: #555; text-decoration: none; border-radius: 5px; font-weight: 500;" class="nav-products">Products</a>
            <a href="/supplier-catalog.html" style="padding: 8px 16px; color: #555; text-decoration: none; border-radius: 5px; font-weight: 500;" class="nav-suppliers">Suppliers</a>

        </div>
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right;">
                <div style="font-weight: 600; color: #333;" id="navUserName">Loading...</div>
                <div style="font-size: 0.85rem; color: #666;" id="navUserRole">Role</div>
            </div>
            <button onclick="logout()" style="padding: 8px 16px; background: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 500;">Logout</button>
        </div>
    </div>
</nav>

<script>
// Navbar functions
function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = '/index.html';
}

// Load user info in navbar
document.addEventListener('DOMContentLoaded', function() {
    const navUser = JSON.parse(localStorage.getItem('currentUser'));
    if (navUser) {
        document.getElementById('navUserName').textContent = navUser.firstName + ' ' + navUser.lastName;
        document.getElementById('navUserRole').textContent = navUser.role;
    }
});
</script>
