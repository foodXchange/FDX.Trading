name: Deploy Container to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: 'foodxchange-deploy-app'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: '.'  # Required but not used for container deployment
        
    - name: 'Configure Container Settings via Azure CLI'
      run: |
        # Extract credentials from publish profile
        PUBLISH_PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
        
        # Extract username and password from publish profile
        USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
        PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
        PUBLISH_URL=$(echo "$PUBLISH_PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1)
        
        # Use Kudu API to update container settings
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/siteextensions/Microsoft.AspNetCore.AzureAppServices.SiteExtension" \
          -u "$USERNAME:$PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{}'
          
        # Update app settings
        curl -X PUT "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/settings" \
          -u "$USERNAME:$PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{
            "DOCKER_REGISTRY_SERVER_URL": "https://${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}",
            "DOCKER_REGISTRY_SERVER_USERNAME": "${{ secrets.AZURE_REGISTRY_USERNAME }}",
            "DOCKER_REGISTRY_SERVER_PASSWORD": "${{ secrets.AZURE_REGISTRY_PASSWORD }}",
            "DOCKER_CUSTOM_IMAGE_NAME": "${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:latest",
            "WEBSITES_PORT": "9000",
            "WEBSITE_WEBDEPLOY_USE_SCM": "true"
          }'
          
        # Restart the app
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/app/restart" \
          -u "$USERNAME:$PASSWORD"
          
    - name: 'Verify deployment'
      run: |
        sleep 60
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || echo "Health check failed"