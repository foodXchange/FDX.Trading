name: Deploy FoodXchange to fdx.trading

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'foodxchange-deploy-app'
  PYTHON_VERSION: '3.11'
  DOMAIN: 'www.fdx.trading'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 'Install dependencies'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 'Run tests'
      run: |
        python -m pytest tests/ -v || echo "No tests found, skipping"
      continue-on-error: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:${{ github.sha }},${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

    - name: 'Configure Container via Kudu API'
      run: |
        # Extract credentials from publish profile
        PUBLISH_PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
        
        # Parse username and password
        USERNAME=$(echo "$PUBLISH_PROFILE" | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -1)
        PASSWORD=$(echo "$PUBLISH_PROFILE" | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -1)
        
        # Update Docker container configuration
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/siteextensions/Microsoft.AspNetCore.AzureAppServices.SiteExtension" \
          -u "$USERNAME:$PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{}' || true
          
        # Set app settings
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/settings" \
          -u "$USERNAME:$PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{
            "DOCKER_REGISTRY_SERVER_URL": "https://${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}",
            "DOCKER_REGISTRY_SERVER_USERNAME": "${{ secrets.AZURE_REGISTRY_USERNAME }}",
            "DOCKER_REGISTRY_SERVER_PASSWORD": "${{ secrets.AZURE_REGISTRY_PASSWORD }}",
            "DOCKER_CUSTOM_IMAGE_NAME": "${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:${{ github.sha }}",
            "WEBSITES_PORT": "9000",
            "WEBSITE_WEBDEPLOY_USE_SCM": "true"
          }'
          
        # Restart the container
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/app/restart" \
          -u "$USERNAME:$PASSWORD"

    - name: 'Verify deployment'
      run: |
        sleep 30
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || echo "Health check failed"

    - name: 'Configure production settings'
      continue-on-error: true
      uses: azure/CLI@v1
      with:
        azcliversion: 2.30.0
        inlineScript: |
          # Core app settings
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings WEBSITES_PORT=9000
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings ENVIRONMENT=production
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings DEBUG=False
          # Domain and security
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings DOMAIN=fdx.trading
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings BASE_URL=https://www.fdx.trading
          # Database (start with SQLite, can upgrade later)
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings DATABASE_URL=sqlite:///production.db
          # Security settings
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings SECURE_SSL_REDIRECT=True