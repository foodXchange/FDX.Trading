name: Deploy to Azure

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'foodxchange-app'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests (optional)
      run: |
        # Add your test commands here
        echo "Running tests..."
        # python -m pytest
        
    - name: Create deployment package
      run: |
        echo "Creating deployment package..."
        # Create a deployment directory
        mkdir -p azure_deployment
        
        # Copy necessary files
        cp minimal_app.py azure_deployment/
        cp requirements.txt azure_deployment/
        cp web.config azure_deployment/
        cp startup.sh azure_deployment/
        
        # Create runtime.txt
        echo "python-3.12" > azure_deployment/runtime.txt
        
        # Create .deployment file
        echo "[config]" > azure_deployment/.deployment
        echo "SCM_DO_BUILD_DURING_DEPLOYMENT=true" >> azure_deployment/.deployment
        
        echo "Deployment package created successfully"
        
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: azure_deployment
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      
    - name: Verify deployment
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
          echo "Waiting for deployment to complete..."
          sleep 30
          echo "Deployment completed! Your app is available at: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        fi 