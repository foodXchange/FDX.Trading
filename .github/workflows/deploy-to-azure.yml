name: Deploy FoodXchange to fdx.trading

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'foodxchange-deploy-app'
  PYTHON_VERSION: '3.11'
  DOMAIN: 'www.fdx.trading'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 'Install dependencies'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 'Run tests'
      run: |
        python -m pytest tests/ -v || echo "No tests found, skipping"
      continue-on-error: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:${{ github.sha }},${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:${{ github.sha }}

    - name: 'Verify deployment'
      run: |
        sleep 30
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || echo "Health check failed"

    - name: 'Configure production settings'
      uses: azure/CLI@v1
      with:
        azcliversion: 2.30.0
        inlineScript: |
          # Configure container settings
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:${{ github.sha }} \
            --docker-registry-server-url https://${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --docker-registry-server-password ${{ secrets.AZURE_REGISTRY_PASSWORD }}
          
          # Core app settings
          az webapp config appsettings set --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ env.AZURE_WEBAPP_NAME }} --settings \
            WEBSITES_PORT=9000 \
            ENVIRONMENT=production \
            DEBUG=False \
            DOMAIN=fdx.trading \
            BASE_URL=https://www.fdx.trading \
            DATABASE_URL=sqlite:///production.db \
            SECURE_SSL_REDIRECT=True