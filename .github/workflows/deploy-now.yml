name: Deploy Now

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: 'foodxchange-deploy-app'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Configure Web App via REST API'
      run: |
        # Use publish profile to get credentials
        PUBLISH_PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
        
        # Extract username and password
        USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1 || echo "")
        PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1 || echo "")
        
        # If extraction failed, try alternate method
        if [ -z "$USERNAME" ]; then
          USERNAME=$(echo "$PUBLISH_PROFILE" | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -1)
        fi
        
        echo "Configuring container deployment..."
        
        # Update app settings via Kudu REST API
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/settings" \
          -u "$USERNAME:$PASSWORD" \
          -H "Content-Type: application/json" \
          -d '{
            "DOCKER_REGISTRY_SERVER_URL": "https://${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}",
            "DOCKER_REGISTRY_SERVER_USERNAME": "${{ secrets.AZURE_REGISTRY_USERNAME }}",
            "DOCKER_REGISTRY_SERVER_PASSWORD": "${{ secrets.AZURE_REGISTRY_PASSWORD }}",
            "DOCKER_CUSTOM_IMAGE_NAME": "${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:latest",
            "WEBSITES_PORT": "9000",
            "WEBSITE_WEBDEPLOY_USE_SCM": "true",
            "DOCKER_ENABLE_CI": "true"
          }'
        
        echo "Restarting web app..."
        
        # Restart the app
        curl -X POST "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/app/restart" \
          -u "$USERNAME:$PASSWORD"
        
        echo "Deployment configured! The container should start pulling and running now."
        
    - name: 'Wait and verify'
      run: |
        echo "Waiting for container to start (this may take 2-3 minutes)..."
        sleep 120
        
        echo "Checking site status..."
        curl -I https://www.fdx.trading || echo "Site may still be starting..."
        
        sleep 30
        
        echo "Checking health endpoint..."
        curl https://www.fdx.trading/health || echo "Health check pending..."