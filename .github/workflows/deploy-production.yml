name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        type: string
      confirm_deployment:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate Deployment Request
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm_deployment != 'DEPLOY'
        run: |
          echo "❌ Deployment cancelled. You must type 'DEPLOY' to confirm."
          exit 1
      
      - name: Check if user has production access
        run: |
          echo "✅ User ${{ github.actor }} is deploying version ${{ github.event.inputs.version }} to production"

  pre-deployment-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: production
      
      - name: Verify staging is stable
        run: |
          # Check staging health
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.foodxchange.com/health)
          if [ $response -ne 200 ]; then
            echo "❌ Staging is not healthy (HTTP $response). Aborting deployment."
            exit 1
          fi
          echo "✅ Staging is healthy"
      
      - name: Check for recent failures
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-production.yml',
              per_page: 5
            });
            
            const recentFailures = runs.workflow_runs
              .filter(run => run.conclusion === 'failure')
              .filter(run => new Date(run.created_at) > new Date(Date.now() - 24 * 60 * 60 * 1000));
            
            if (recentFailures.length >= 2) {
              core.setFailed('❌ Multiple recent deployment failures detected. Please investigate before proceeding.');
            }

  build-and-tag:
    name: Build and Tag Production Image
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: production
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push production image
        id: tag
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          docker build -t ${IMAGE_TAG} .
          docker tag ${IMAGE_TAG} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest
          docker push ${IMAGE_TAG}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-tag
    environment:
      name: production
      url: https://foodxchange.com
    steps:
      - name: Manual Approval Required
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ vars.PRODUCTION_APPROVERS }}
          minimum-approvals: 2
          issue-title: "Production Deployment Approval Required"
          issue-body: |
            ## 🚀 Production Deployment Request
            
            **Version:** ${{ github.event.inputs.version }}
            **Requested by:** @${{ github.actor }}
            **Timestamp:** ${{ github.event.head_commit.timestamp }}
            
            ### Pre-deployment Checklist
            - [ ] Staging tests passed
            - [ ] Database migrations reviewed
            - [ ] Rollback plan prepared
            - [ ] Team notified
            
            ### Deployment Details
            - Image: `${{ needs.build-and-tag.outputs.image-tag }}`
            - Target: Production environment
            
            **Please review and approve this deployment.**
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}
      
      - name: Add production servers to known hosts
        run: |
          mkdir -p ~/.ssh
          for host in ${{ secrets.PRODUCTION_HOSTS }}; do
            ssh-keyscan -H ${host} >> ~/.ssh/known_hosts
          done
      
      - name: Create database backup
        run: |
          for host in ${{ secrets.PRODUCTION_HOSTS }}; do
            ssh ${{ secrets.PRODUCTION_USER }}@${host} << 'ENDSSH'
              cd /opt/foodxchange
              docker compose -f docker-compose.production.yml exec -T db \
                pg_dump -U foodxchange foodxchange_prod | \
                gzip > backups/pre_deployment_$(date +%Y%m%d_%H%M%S).sql.gz
            ENDSSH
          done
      
      - name: Deploy to production servers
        env:
          VERSION: ${{ github.event.inputs.version }}
          IMAGE_TAG: ${{ needs.build-and-tag.outputs.image-tag }}
        run: |
          # Deploy to each production server
          for host in ${{ secrets.PRODUCTION_HOSTS }}; do
            echo "Deploying to ${host}..."
            
            # Copy necessary files
            scp docker-compose.production.yml ${{ secrets.PRODUCTION_USER }}@${host}:/opt/foodxchange/
            scp scripts/deploy.sh ${{ secrets.PRODUCTION_USER }}@${host}:/opt/foodxchange/
            
            # Execute deployment
            ssh ${{ secrets.PRODUCTION_USER }}@${host} << ENDSSH
              cd /opt/foodxchange
              
              # Set environment variables
              export VERSION=${VERSION}
              export GITHUB_REPOSITORY=${{ github.repository }}
              
              # Run deployment script
              chmod +x deploy.sh
              ./deploy.sh ${VERSION}
            ENDSSH
          done
      
      - name: Verify deployment
        run: |
          sleep 60  # Wait for deployment to stabilize
          
          for host in ${{ secrets.PRODUCTION_HOSTS }}; do
            echo "Verifying ${host}..."
            
            # Health check
            response=$(curl -s -o /dev/null -w "%{http_code}" https://${host}/health)
            if [ $response -ne 200 ]; then
              echo "❌ Health check failed on ${host} (HTTP $response)"
              exit 1
            fi
            
            # Version check
            deployed_version=$(curl -s https://${host}/api/version | jq -r '.version')
            if [ "$deployed_version" != "${{ github.event.inputs.version }}" ]; then
              echo "❌ Version mismatch on ${host}. Expected: ${{ github.event.inputs.version }}, Got: $deployed_version"
              exit 1
            fi
            
            echo "✅ ${host} is healthy and running version ${{ github.event.inputs.version }}"
          done

  post-deployment:
    name: Post-deployment Tasks
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()
    steps:
      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            ## 🎉 Production Release ${{ github.event.inputs.version }}
            
            **Deployed by:** @${{ github.actor }}
            **Deployment time:** ${{ github.event.head_commit.timestamp }}
            
            ### Deployment Summary
            - ✅ All production servers updated
            - ✅ Health checks passed
            - ✅ Database backed up
          draft: false
          prerelease: false
      
      - name: Notify team
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            🚀 Production Deployment Successful!
            Version: ${{ github.event.inputs.version }}
            Deployed by: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    steps:
      - name: Initiate rollback
        run: |
          echo "🔄 Initiating automatic rollback..."
          
          for host in ${{ secrets.PRODUCTION_HOSTS }}; do
            ssh ${{ secrets.PRODUCTION_USER }}@${host} << 'ENDSSH'
              cd /opt/foodxchange
              
              # Run rollback script
              chmod +x rollback.sh
              ./rollback.sh
            ENDSSH
          done
      
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "⚠️ Production deployment failed and was rolled back",
              attachments: [{
                color: "danger",
                fields: [{
                  title: "Version",
                  value: "${{ github.event.inputs.version }}",
                  short: true
                }, {
                  title: "Actor",
                  value: "${{ github.actor }}",
                  short: true
                }]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}