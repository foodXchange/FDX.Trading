name: Deploy with Existing Secrets

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: 'foodxchange-deploy-app'
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: 'Deploy using Azure CLI in Docker'
      run: |
        # Pull the latest image
        docker pull ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:latest
        
        # Use Azure CLI in Docker with service principal login
        docker run --rm \
          -e AZURE_CLIENT_ID="${{ secrets.AZUREAPPSERVICE_CLIENTID_4B1775FDD2034EFA9CE58403665C630D }}" \
          -e AZURE_TENANT_ID="${{ secrets.AZUREAPPSERVICE_TENANTID_9960A9C9DAB845D18B7E9C272DA67C6A }}" \
          -e AZURE_SUBSCRIPTION_ID="${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_493477D657AB49C48229A99C4425C65A }}" \
          mcr.microsoft.com/azure-cli:latest \
          /bin/bash -c "
            # Login with service principal (need client secret)
            echo 'Configuring Web App for container deployment...'
            
            # Try using managed identity or existing auth
            az login --identity || echo 'Identity login failed'
            
            # Set subscription
            az account set --subscription ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_493477D657AB49C48229A99C4425C65A }}
            
            # Configure the web app to use the container
            az webapp config container set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --docker-custom-image-name ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/foodxchange:latest \
              --docker-registry-server-url https://${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} \
              --docker-registry-server-user ${{ secrets.AZURE_REGISTRY_USERNAME }} \
              --docker-registry-server-password '${{ secrets.AZURE_REGISTRY_PASSWORD }}'
              
            # Set app settings
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --settings WEBSITES_PORT=9000 WEBSITE_WEBDEPLOY_USE_SCM=true
              
            # Restart the app
            az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          "

    - name: 'Verify deployment'
      run: |
        sleep 60
        curl -f https://www.fdx.trading/health || echo "Health check failed - site may still be starting up"