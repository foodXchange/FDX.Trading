name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=staging-latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.foodxchange.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      
      - name: Add staging server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to staging server
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.STAGING_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          # Copy docker-compose and env files
          scp docker-compose.staging.yml ${USER}@${HOST}:/opt/foodxchange/
          scp .env.staging.example ${USER}@${HOST}:/opt/foodxchange/.env.staging
          
          # Deploy on staging server
          ssh ${USER}@${HOST} << 'ENDSSH'
            cd /opt/foodxchange
            
            # Set environment variables
            export VERSION=$(echo "$IMAGE_TAG" | cut -d',' -f1)
            export GITHUB_REPOSITORY=${{ github.repository }}
            
            # Pull new image
            docker compose -f docker-compose.staging.yml pull
            
            # Backup database before deployment
            docker compose -f docker-compose.staging.yml exec -T db pg_dump -U foodxchange foodxchange_staging > backup_$(date +%Y%m%d_%H%M%S).sql
            
            # Deploy with zero downtime
            docker compose -f docker-compose.staging.yml up -d --no-deps --scale web=2 web
            sleep 30
            docker compose -f docker-compose.staging.yml up -d --no-deps web
            
            # Run migrations
            docker compose -f docker-compose.staging.yml exec -T web alembic upgrade head
            
            # Health check
            for i in {1..30}; do
              if curl -f http://localhost:8000/health; then
                echo "Health check passed"
                break
              fi
              echo "Waiting for app to be healthy..."
              sleep 10
            done
            
            # Clean up old images
            docker image prune -af
          ENDSSH
      
      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}