name: Deploy to Production VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VM_HOST: 74.248.141.31
  VM_USER: azureuser
  VM_PATH: /home/azureuser/foodxchange

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to VM
      run: |
        # Create deployment package
        tar -czf deploy.tar.gz --exclude='.git' --exclude='node_modules' .
        
        # Upload to VM
        scp deploy.tar.gz ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.VM_PATH }}/
        
        # Extract and restart on VM
        ssh ${{ env.VM_USER }}@${{ env.VM_HOST }} << 'EOF'
          cd ${{ env.VM_PATH }}
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz
          
          # Install dependencies
          pip3 install -r requirements.txt
          
          # Restart application
          sudo systemctl restart gunicorn
          sudo systemctl restart nginx
          
          # Check status
          sudo systemctl status gunicorn --no-pager
          echo "Deployment completed successfully!"
        EOF
        
    - name: Health Check
      run: |
        # Wait for app to start
        sleep 10
        
        # Test application
        curl -f http://${{ env.VM_HOST }}:8000/health || exit 1
        echo "Health check passed!"
        
    - name: Notify Success
      if: success()
      run: |
        echo "✅ Deployment to Poland Central VM successful!"
        echo "🌐 Application: http://${{ env.VM_HOST }}"
        echo "📊 Monitoring: http://${{ env.VM_HOST }}:3000"
        
    - name: Notify Failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "🔧 Check VM logs: ssh ${{ env.VM_USER }}@${{ env.VM_HOST }}"
        echo "📋 View logs: sudo journalctl -u gunicorn -f"