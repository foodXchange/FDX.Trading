name: Simple Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: foodxchange-app
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create deployment package
      run: |
        # Create startup script
        cat > startup.py << 'EOF'
        import os
        import sys
        import logging
        from pathlib import Path

        # Configure logging
        logging.basicConfig(level=logging.INFO)
        logger = logging.getLogger(__name__)

        def main():
            try:
                # Import FastAPI app
                from app.main import app
                import uvicorn
                
                port = int(os.environ.get("PORT", 8000))
                logger.info(f"Starting app on port {port}")
                
                uvicorn.run(app, host="0.0.0.0", port=port)
            except Exception as e:
                logger.error(f"Failed to start: {e}")
                # Create fallback app
                from fastapi import FastAPI
                app = FastAPI()
                
                @app.get("/")
                def root():
                    return {"status": "fallback", "error": str(e)}
                
                @app.get("/health")
                def health():
                    return {"status": "ok"}
                
                import uvicorn
                port = int(os.environ.get("PORT", 8000))
                uvicorn.run(app, host="0.0.0.0", port=port)

        if __name__ == "__main__":
            main()
        EOF
        
        # Create deployment zip
        zip -r foodxchange-deploy.zip . \
          -x "*.git*" -x "venv/*" -x "__pycache__/*" -x "*.pyc" \
          -x ".env*" -x "tests/*" -x "*.md" -x ".github/*"
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: foodxchange-deploy.zip
    
    - name: Wait and verify
      run: |
        echo "Waiting for deployment to complete..."
        sleep 60
        
        echo "Testing endpoints..."
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || echo "Health check failed"
        curl -f https://www.fdx.trading/health || echo "Custom domain check failed"