name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.11'
  REGISTRY_URL: ${{ secrets.AZURE_REGISTRY_URL }}

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: |
          pytest -v --tb=short
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret-key
          ENVIRONMENT: test

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.azure
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/foodxchange:latest
            ${{ env.REGISTRY_URL }}/foodxchange:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://www.fdx.trading
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.REGISTRY_URL }}/foodxchange:${{ github.sha }}
      
      - name: Set Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          mask-inputs: false
          app-settings-json: |
            [
              {
                "name": "ENVIRONMENT",
                "value": "production"
              },
              {
                "name": "DEBUG",
                "value": "False"
              },
              {
                "name": "DATABASE_URL",
                "value": "${{ secrets.DATABASE_URL }}"
              },
              {
                "name": "REDIS_URL",
                "value": "${{ secrets.REDIS_URL }}"
              },
              {
                "name": "SECRET_KEY",
                "value": "${{ secrets.SECRET_KEY }}"
              },
              {
                "name": "AZURE_OPENAI_ENDPOINT",
                "value": "${{ secrets.AZURE_OPENAI_ENDPOINT }}"
              },
              {
                "name": "AZURE_OPENAI_KEY",
                "value": "${{ secrets.AZURE_OPENAI_KEY }}"
              },
              {
                "name": "AZURE_OPENAI_DEPLOYMENT_NAME",
                "value": "${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}"
              },
              {
                "name": "AZURE_VISION_ENDPOINT",
                "value": "${{ secrets.AZURE_VISION_ENDPOINT }}"
              },
              {
                "name": "AZURE_VISION_KEY",
                "value": "${{ secrets.AZURE_VISION_KEY }}"
              },
              {
                "name": "AZURE_STORAGE_CONNECTION_STRING",
                "value": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
              },
              {
                "name": "WEBSITES_PORT",
                "value": "8000"
              },
              {
                "name": "WEBSITES_CONTAINER_START_TIME_LIMIT",
                "value": "600"
              }
            ]
      
      - name: Run Database Migrations
        run: |
          az webapp ssh --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --command "cd /app && python -m alembic upgrade head"
        continue-on-error: true

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 60
      
      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.fdx.trading/health)
          if [ $response -eq 200 ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status $response"
            exit 1
          fi
      
      - name: SSL Certificate Check
        run: |
          echo | openssl s_client -servername www.fdx.trading -connect www.fdx.trading:443 2>/dev/null | openssl x509 -noout -dates
      
      - name: Performance Check
        run: |
          curl -o /dev/null -s -w "Connect: %{time_connect}s\nTTFB: %{time_starttransfer}s\nTotal: %{time_total}s\n" https://www.fdx.trading
      
      - name: Notify Success
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Application is live at https://www.fdx.trading"
          echo "📊 Version: ${{ github.sha }}"
      
      - name: Rollback on Failure
        if: failure()
        run: |
          echo "❌ Deployment verification failed. Initiating rollback..."
          # Add rollback commands here if needed