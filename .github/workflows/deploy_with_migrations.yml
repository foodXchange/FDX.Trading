name: Deploy to Azure with Migrations

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-name  # Replace with your App Service name
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Create and activate virtual environment
      run: |
        python -m venv venv
        source venv/bin/activate
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests (optional)
      run: |
        # Add your test commands here
        echo "No tests configured yet"
    
    - name: Create deployment package
      run: |
        # Include migrations in the deployment
        zip -r deploy.zip . -x "*.git*" "venv/*" "__pycache__/*" "*.pyc"
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: deploy.zip
    
    - name: Run migrations on Azure
      uses: azure/CLI@v1
      with:
        azcliversion: latest
        inlineScript: |
          # Install Azure App Service extension
          az extension add --name webapp
          
          # Run migration command on the deployed app
          az webapp ssh --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group foodxchange-rg \
            --command "cd /home/site/wwwroot && python migrate.py upgrade"