<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Search - FDX.trading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .supplier-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .supplier-card:hover {
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">FDX.trading</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/suppliers">Search</a>
            <a class="nav-link" href="/projects">Projects</a>
            <a class="nav-link" href="/email">Email</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1>Find Suppliers</h1>
    
    <div class="card mb-4">
        <div class="card-body">
            <form id="searchForm" onsubmit="return performSearch(event)">
                <div class="input-group">
                    <input type="text" id="searchQuery" class="form-control" 
                           placeholder="Enter product (e.g., sunflower oil, olive oil, pasta)" required>
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Searching...</span>
        </div>
        <p class="mt-2">Searching suppliers...</p>
    </div>
    
    <div id="results"></div>
</div>

<script>
async function performSearch(event) {
    event.preventDefault();
    
    const query = document.getElementById('searchQuery').value;
    if (!query) return;
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').innerHTML = '';
    
    try {
        const formData = new FormData();
        formData.append('query', query);
        
        const response = await fetch('/api/search', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        document.getElementById('loading').style.display = 'none';
        
        // Handle both data.results and data.suppliers formats
        const suppliers = data.results || data.suppliers || [];
        
        if (suppliers.length === 0) {
            document.getElementById('results').innerHTML = 
                '<div class="alert alert-warning">No suppliers found. Try a different search term like "oil", "pasta", or "coffee".</div>';
            return;
        }
        
        let html = '<h3>' + suppliers.length + ' Suppliers Found</h3>';
        
        suppliers.forEach(supplier => {
            html += `
                <div class="supplier-card">
                    <h5>${supplier.supplier_name || supplier.name}</h5>
                    <p><strong>Country:</strong> ${supplier.country || 'Unknown'}</p>
                    <p><strong>Email:</strong> ${supplier.email || supplier.company_email || 'Not available'}</p>
                    ${supplier.website ? `<p><strong>Website:</strong> <a href="${supplier.website.startsWith('http') ? supplier.website : 'http://' + supplier.website}" target="_blank">${supplier.website}</a></p>` : ''}
                    ${supplier.product_preview || supplier.products ? `<p><strong>Products:</strong> ${(supplier.product_preview || supplier.products || '').substring(0, 200)}...</p>` : ''}
                    ${supplier.verified ? '<span class="badge bg-success">Verified</span>' : ''}
                    ${supplier.rating ? `<span class="badge bg-info">Rating: ${supplier.rating}/5</span>` : ''}
                </div>
            `;
        });
        
        document.getElementById('results').innerHTML = html;
        
    } catch (error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('results').innerHTML = 
            '<div class="alert alert-danger">Error performing search. Please try again.</div>';
        console.error('Search error:', error);
    }
}

// Test search on page load
window.onload = function() {
    // You can uncomment this to auto-search on page load
    // document.getElementById('searchQuery').value = 'oil';
    // performSearch(new Event('submit'));
};
</script>

</body>
</html>
