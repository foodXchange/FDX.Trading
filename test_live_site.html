<!DOCTYPE html>
<html>
<head>
    <title>Test Live Site API</title>
</head>
<body>
    <h1>Test Live Site API</h1>
    <button onclick="testSearch()">Test Search</button>
    <div id="result"></div>

    <script>
    async function testSearch() {
        document.getElementById('result').innerHTML = 'Testing...';
        
        try {
            const formData = new FormData();
            formData.append('query', 'oil');
            
            const response = await fetch('https://www.fdx.trading/api/search', {
                method: 'POST',
                body: formData
            });
            
            console.log('Response status:', response.status);
            console.log('Response headers:', response.headers);
            
            const data = await response.json();
            console.log('Response data:', data);
            
            document.getElementById('result').innerHTML = `
                <h3>API Response:</h3>
                <p>Status: ${response.status}</p>
                <p>Total Results: ${data.total_results}</p>
                <p>First Supplier: ${data.results && data.results[0] ? data.results[0].supplier_name : 'None'}</p>
                <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
            `;
            
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
        }
    }
    </script>
</body>
</html>
