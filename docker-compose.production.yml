version: '3.8'

services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:${VERSION:-latest}
    container_name: foodxchange_web_prod
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 8 --timeout 120 --max-requests 1000 --max-requests-jitter 50 foodxchange.main:app -k uvicorn.workers.UvicornWorker
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=postgresql://foodxchange:${DB_PASSWORD_PROD}@db:5432/foodxchange_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD_PROD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foodxchange_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  db:
    image: postgres:15-alpine
    container_name: foodxchange_db_prod
    environment:
      - POSTGRES_USER=foodxchange
      - POSTGRES_PASSWORD=${DB_PASSWORD_PROD}
      - POSTGRES_DB=foodxchange_prod
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodxchange -d foodxchange_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodxchange_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: foodxchange_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD_PROD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD_PROD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodxchange_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: foodxchange_nginx_prod
    volumes:
      - ./nginx/production.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
      - ./logs/nginx:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - foodxchange_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backup:
    image: postgres:15-alpine
    container_name: foodxchange_backup_prod
    environment:
      - PGPASSWORD=${DB_PASSWORD_PROD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: /bin/sh -c "chmod +x /backup.sh && crond -f"
    depends_on:
      - db
    networks:
      - foodxchange_network
    restart: always

networks:
  foodxchange_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data-prod:
  redis-data-prod: