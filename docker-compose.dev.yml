version: '3.8'

services:
  foodxchange-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: foodxchange-dev
    volumes:
      - .:/workspace:cached
      - foodxchange-dev-cache:/root/.cache
    working_dir: /workspace
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PORT=9000
      - PYTHONPATH=/workspace
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/foodxchange_dev
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "9000:9000"
    depends_on:
      - db
      - redis
    command: sleep infinity
    networks:
      - foodxchange-dev-network

  db:
    image: postgres:15-alpine
    container_name: foodxchange-dev-db
    environment:
      POSTGRES_DB: foodxchange_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - foodxchange-dev-db-data:/var/lib/postgresql/data
      - ./configs/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - foodxchange-dev-network

  redis:
    image: redis:7-alpine
    container_name: foodxchange-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - foodxchange-dev-redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - foodxchange-dev-network

volumes:
  foodxchange-dev-cache:
  foodxchange-dev-db-data:
  foodxchange-dev-redis-data:

networks:
  foodxchange-dev-network:
    driver: bridge